  - id: event_waylan_york_a
    name: |-
      Đằng sau một bàn giấy lớn là một người 
      "Ah! Không...
    description: Imported from Excel
    event_type: dialogue
    tags:
      - begin_interview
    message:
      text: >-
        Đằng sau một bàn giấy lớn là một người trạc tầm tuổi ba mươi với những nếp nhăn nơi khóe mắt hằn sâu dấu vết của
        nắng muối và những dặm dài trên biển. Mái tóc màu nâu hạt dẻ được chải chuốt gọn gàng, điểm xuyết những sợi bạc
        lấp lánh dưới ánh sáng. Anh ta khoác trên mình chiếc áo brigandine bằng nhung xanh thẫm, với những chiếc đinh
        tán bạc phản chiếu ánh nắng từ ngoài cửa sổ. Bộ giáp sạch sẽ, tươm tất, mang theo dáng vẻ tĩnh lặng của một sĩ
        quan trẻ.


        "Ah! Không biết ${2p} tới đây có vất vả không? Kể từ khi có xung đột với Arbrance,  an ninh được thắt chặt khiến
        cho việc đi lại trở nên khó khăn hơn đáng kể. Xin lỗi, mời ${2p} ngồi xuống. Tôi là York Waylan, cứ gọi tôi là
        York là được. Rất hân hạnh được gặp ${2p}."
      npc_speaker: npc_1771024316235
      message_type: normal
    options:
      - id: event_waylan_york_a-option-1
        text: Tôi là ${player_fullname}, rất vui được gặp anh York.
        next: event_waylan_york_flag_a
        display_order: 1
      - id: event_waylan_york_a-option-2
        text: Tạ ơn Cửu Thánh, đường đi cũng khá là suôn sẻ. Tôi tên là ${player_fullname}.
        next: event_waylan_york_flag_b
        display_order: 2
      - id: event_waylan_york_a-option-3
        text: Đường đi khá trắc trở. Cướp, đầm lầy, cây đổ. Có gì uống được không? À, tôi là ${player_fullname}.
        next: event_waylan_york_flag_c
        display_order: 3
      - id: event_waylan_york_a-option-4
        text: Tôi là ${player_fullname}. Một cái tên sẽ đi vào lịch sử, nhưng giờ cứ gọi tôi là ${player_name}.
        next: event_waylan_york_flag_d
        display_order: 4

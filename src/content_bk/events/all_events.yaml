  - id: event_waylan_york_b
    name: "\"Để bắt đầu, ${2p} có thể giới thiệu đôi nét về bả..."
    description: Imported from Excel
    event_type: dialogue
    message:
      text: "\"Để bắt đầu, ${2p} có thể giới thiệu đôi nét về bản thân? ${2p} ${player_name} đến từ đâu nhỉ?\""
      npc_speaker: npc_1771024316235
      message_type: normal
    options:
      - id: event_waylan_york_b-option-1
        text: Vương đô Griffin's Lair, nơi kinh kỳ nhộn nhịp.
        next: event_waylan_york_flag_e
        display_order: 1
      - id: event_waylan_york_b-option-2
        text: Công quốc Crimsonland, tôi lớn lên tại vùng đồi núi hiểm trở, nơi biên cương với Arbrence hùng mạnh
        next: event_waylan_york_flag_f
        display_order: 2
      - id: event_waylan_york_b-option-3
        text: Thân vương quốc Messana, tôi đến từ những bến cảng tấp nập
        next: event_waylan_york_flag_g
        display_order: 3
      - id: event_waylan_york_b-option-4
        text: Xứ Impalester, vùng đất tinh hoa của quý tộc Gateland với những lâu đài vững chắc
        next: event_waylan_york_flag_h
        display_order: 4
      - id: event_waylan_york_b-option-5
        text: Công quốc Ressland, quê hương tôi là vùng đồng bằng màu mỡ, vựa lúa của vương quốc
        next: event_waylan_york_flag_i
        display_order: 5
      - id: event_waylan_york_b-option-6
        text: Công quốc Lowriver vùng sông nước, con đường vận chuyển hàng hóa vào sâu trong nội địa vương quốc.
        next: event_waylan_york_flag_j
        display_order: 6
      - id: event_waylan_york_b-option-7
        text: Tỉnh Highstone, những ngọn đồi lộng gió với những khu mỏ kim loại quý giá.
        next: event_waylan_york_flag_k
        display_order: 7
      - id: event_waylan_york_b-option-8
        text: Thân vương quốc Cyanland, cao nguyên xa xôi và lạnh giá đằng sau dãy Cyan
        next: event_waylan_york_flag_l
        display_order: 8

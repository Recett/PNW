  # RATS — HMS DIVINE PROLOGUE
  # Fast and aggressive. Meaningful damage even through armor.
  # Stat equivalents:
  #   Rat:       STR6 DEX7 AGI10 CON4
  #   Adult Rat: STR8 DEX8 AGI9  CON6
  #
  # vs starter armor (def=1): rat=58% player HP, adult=78%
  # vs leather armor (def=4): rat=29% player HP, adult=44%
  # Player needs 2 hits to kill rat, 4 for adult rat
  # -----------------------------------------------

  - id: rat
    name: Rat
    unknown_name: Rat
    level: 1
    enemy_type: beast
    status: active
    stat:
      health: 20
      defense: 0
      defense_percent: 0
      crit_resistance: 0
      evade: 16
      speed: 16

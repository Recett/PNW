enemies:

  # -----------------------------------------------
  # RATS — HMS DIVINE PROLOGUE
  # Fast and aggressive. Meaningful damage even through armor.
  # Stat equivalents:
  #   Rat:       STR6 DEX7 AGI10 CON4
  #   Adult Rat: STR8 DEX8 AGI9  CON6
  #
  # vs starter armor (def=1): rat=58% player HP, adult=78%
  # vs leather armor (def=4): rat=29% player HP, adult=44%
  # Player needs 2 hits to kill rat, 4 for adult rat
  # -----------------------------------------------

  - id: rat
    name: Rat
    unknown_name: Rat
    description: A common ship rat. Filthy, fast, and fearless. It bares its yellowed teeth and lunges without hesitation.
    level: 1
    enemy_type: beast
    status: active
    stat:
      health: 20
      defense: 0
      defense_percent: 0
      crit_resistance: 0
      evade: 14
      speed: 14
    attack:
      - id: bite
        name: Bite
        base_damage: 7
        accuracy: 12
        critical_chance: 10
        cooldown: 90
        description: A quick, vicious snap at exposed skin.
    reward:
      exp: 30
      item:
        - id: rat_meat
          chance: 0.7
          quantity: 1

  - id: rat_adult
    name: Adult Rat
    unknown_name: Adult Rat
    description: A large, battle-scarred rat the size of a small cat. Slow to provoke but relentless once it attacks.
    level: 2
    enemy_type: beast
    status: active
    stat:
      health: 35
      defense: 0
      defense_percent: 0
      crit_resistance: 0
      evade: 13
      speed: 13
    attack:
      - id: bite
        name: Bite
        base_damage: 10
        accuracy: 10
        critical_chance: 3
        cooldown: 90
        description: A heavy, deliberate bite that tears through cloth and flesh alike.
    reward:
      exp: 50
      item:
        - id: rat_meat
          chance: 0.5
          quantity: 1
        - id: rat_meat
          chance: 0.5
          quantity: 2

  - id: rat_ghoul
    name: Rat Ghoul
    unknown_name: Rat Ghoul
    description: A rat twisted by death into something worse. Its movements are jerky and wrong, and its bite carries a foul cold that lingers long after the wound closes.
    level: 4
    enemy_type: undead
    status: active
    stat:
      health: 160
      defense: 2
      defense_percent: 0
      crit_resistance: 10
      evade: 14
      speed: 14
    attack:
      - id: rend
        name: Rend
        base_damage: 22
        accuracy: 12
        critical_chance: 15
        cooldown: 90
        description: Ragged claws and dead teeth tear at the wound in unison.
    reward:
      exp: 120

  - id: rat_king
    name: Rat King
    unknown_name: Rat King
    description: Dozens of rats knotted together by their tails into a writhing, many-headed mass. The Rat King does not flee. It does not tire. It only grows.
    level: 5
    enemy_type: beast
    status: active
    tag:
      - persistent_hp
      - unique_per_voyage
    stat:
      health: 200
      defense: 1
      defense_percent: 0
      crit_resistance: 0
      evade: 10
      speed: 12
    attack:
      - id: bite
        name: Bite
        base_damage: 14
        accuracy: 10
        critical_chance: 5
        cooldown: 90
        description: A dozen mouths bite at once from every direction.
    regen_per_day: 20
    regen_per_fight: 20
    reward:
      gold: 0
      exp: 200
    drop:
      - id: ratsbane
        chance: 1.0
        quantity: 1

  - id: rat_king_enraged
    name: Rat King
    unknown_name: Rat King
    description: The Rat King, broken open and furious. Half its bodies are dead weight, dragging behind the living ones. It is faster now, not despite the damage — because of it.
    level: 5
    enemy_type: beast
    status: active
    tag:
      - persistent_hp
      - unique_per_voyage
    stat:
      health: 200
      defense: 1
      defense_percent: 0
      crit_resistance: 0
      evade: 10
      speed: 15
    attack:
      - id: bite
        name: Bite
        base_damage: 20
        accuracy: 12
        critical_chance: 20
        cooldown: 90
        description: The mass lurches forward and tears with everything it has left.
    regen_per_day: 20
    regen_per_fight: 20
    reward:
      gold: 0
      exp: 200
    drop:
      - id: ratsbane
        chance: 1.0
        quantity: 1

  # -----------------------------------------------
  # UNDEAD RATS — twice as strong as their living counterparts
  # Shambling and slow, but far tougher and hit harder.
  # Stat equivalents (undead):
  #   Undead Rat:       2x HP, 2x dmg, defense+2, half evade/speed
  #   Undead Rat King:  2x HP, 2x dmg, defense+2, reduced evade/speed
  #
  # vs starter armor (def=1): undead_rat=~116% player HP
  # vs leather armor (def=4): undead_rat=~58% player HP
  # Player needs ~4 hits to kill undead rat
  # -----------------------------------------------

  - id: rat_undead
    name: Undead Rat
    unknown_name: Undead Rat
    description: A dead rat that refuses to stay dead. It moves without instinct or hunger — only forward, only toward you.
    level: 2
    enemy_type: undead
    status: active
    stat:
      health: 30
      defense: 0
      defense_percent: 0
      crit_resistance: 5
      evade: 14
      speed: 14
    attack:
      - id: bite
        name: Bite
        base_damage: 12
        accuracy: 12
        critical_chance: 10
        cooldown: 90
        description: Cold teeth close around the wound and do not let go.
    reward:
      exp: 60

  - id: rat_adult_undead
    name: Undead Adult Rat
    unknown_name: Undead Adult Rat
    description: Larger than a normal rat in life, larger still in death. The rot has not slowed it — if anything, it has made it indifferent to pain.
    level: 3
    enemy_type: undead
    status: active
    stat:
      health: 60
      defense: 0
      defense_percent: 0
      crit_resistance: 5
      evade: 10
      speed: 10
    attack:
      - id: bite
        name: Bite
        base_damage: 16
        accuracy: 10
        critical_chance: 5
        cooldown: 90
        description: A grinding, patient bite that presses through armor like it were cloth.
    reward:
      exp: 80

  - id: rat_king_undead
    name: Undead Rat King
    unknown_name: Undead Rat King
    description: The Rat King, dead and still moving. The knot at its centre has darkened to something like leather. Whatever drove the living mass has been replaced by something quieter, and far more patient.
    level: 6
    enemy_type: undead
    status: active
    tag:
      - persistent_hp
      - unique_per_voyage
    stat:
      health: 1000
      defense: 3
      defense_percent: 0
      crit_resistance: 10
      evade: 12
      speed: 12
    attack:
      - id: bite
        name: Bite
        base_damage: 30
        accuracy: 14
        critical_chance: 10
        cooldown: 90
        description: The mass descends as one. There is no gap in the teeth.
    regen_per_day: 200
    regen_per_fight: 40
    reward:
      gold: 0
      exp: 400
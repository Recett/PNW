# ===============================================
# OTHER ITEMS DEFINITION FILE
# ===============================================
# This file defines consumables, materials, quest items, and miscellaneous items.
#
# Complete Example (all possible fields):
#   - id: "101"                          # Required: Unique identifier (string)
#     name: "Health Potion"              # Required: Display name
#     description: "Restores 50 HP"     # Optional: Item description
#     item_type: consumable              # Required: "consumable"|"material"|"quest_item"|"misc"
#     value: 25                          # Optional: Gold value for trading
#     weight: 1                          # Optional: Inventory weight
#     tag:                               # Optional: Classification array
#       - healing
#
# Last modified: 2026-03-23
# ===============================================

other_items:
  - id: rat_meat
    name: Rat Meat
    description: A small, scraggly piece of rat meat. Not appetizing, but it is food.
    item_type: material
    value: 2
    tag:
      - cooking_ingredient
      - raw_meat
    metadata:
      stackable: true
      tradeable: true

  - id: herring
    name: Herring
    description: A small, oily fish. Common in these waters.
    item_type: material
    value: 4
    tag:
      - cooking_ingredient
      - base_ingredient
      - fish
      - cooking_trait_oily
    metadata:
      stackable: true
      tradeable: true
      initialTrait:
        - Oily

  - id: mackerel
    name: Mackerel
    description: A firm-fleshed fish with a clean flavour.
    item_type: material
    value: 6
    tag:
      - cooking_ingredient
      - base_ingredient
      - fish
      - cooking_trait_tender
    metadata:
      stackable: true
      tradeable: true
      initialTrait:
        - Tender

  - id: crab_meat
    name: Crab Meat
    description: Firm, faintly sweet meat from a giant crab. It put up a fight.
    item_type: material
    value: 12
    tag:
      - cooking_ingredient
      - base_ingredient
      - crustacean

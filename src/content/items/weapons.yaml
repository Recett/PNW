# ===============================================
# WEAPONS DEFINITION FILE
# ===============================================
# This file defines all weapons in the game including melee weapons, ranged weapons, and shields.
#
# Schema:
#   id: string (required) - Unique identifier
#   name: string (required) - Display name
#   description: string - Flavor text
#   item_type: "weapon" (required)
#   value: number - Gold value
#   weight: number - Inventory weight
#   tags: array - Classification tags
#   weapon: object (required) - Weapon properties
#     slot: "mainhand"|"offhand"|"twohand"
#     subtype: weapon category
#     base_damage: number - Base damage
#     scaling: number - Stat scaling (0.0-1.0)
#     hit_mod: number - Hit chance (0.0-1.0)
#     cooldown: number - Attack speed
#
# Last modified: 2026-03-23
# ===============================================


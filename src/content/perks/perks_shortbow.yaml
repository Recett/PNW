perks:
  - id: sbow-focus
    name: Focus
    description: "Unlocks the Evasion Stack system. Each hit you land builds 1 evasion stack, granting bonus evasion and attack speed. All stacks are consumed when you are struck or evade an incoming attack. Required for Evasion and Momentum tree perks."
    category: combat
    skill: shortbow
    skill_level_required: 1
    power: 0
    cost: 5
    timing: battle_start
  - id: sbow-evasion-1
    name: Basic Evasion
    description: "Each evasion stack grants +5% evade chance. Stacks build on hit and flush when you take damage or dodge. Scales with how consistently you land attacks."
    category: combat
    skill: shortbow
    skill_level_required: 6
    power: 0.08
    cost: 10
    tier: 1
    group: sbow-evasion
    timing: before_turn

perks:
  - id: spear-brace
    name: Brace
    description: "Unlocks the spear counter system. Taking hits charges a counter-attack that fires automatically at 3 charges. Counter damage uses a harmonic mean of your best spear attack and the enemy's attack, scaling with both offense and defense. Required for Thorn and Steady tree perks."
    category: combat
    skill: spear
    skill_level_required: 1
    power: 0
    cost: 5
    timing: battle_start
  - id: spear-thorn-1
    name: Basic Thorn
    description: "Counter multiplier +0.20 (total 1.20). Each Thorn tier amplifies the counter-attack's damage output. Stacks additively with further Thorn investment."

perks:
  - id: rapier-prise-de-fer
    name: Prise de Fer
    description: "Unlocks the Parry mechanic. Named after the classical French fencing technique — prise de fer means 'seizure of the blade,' redirecting force rather than absorbing it. When struck, there is a chance to deflect and reduce incoming damage. Base parry chance ceiling: 40%. Required for all Parry tree perks."
    category: combat
    skill: rapier
    skill_level_required: 1
    power: 0.40
    cost: 5
    timing: battle_start
  - id: rapier-parry-1
    name: Basic Parry
    description: "Raises parry chance ceiling to 44%. Each point invested in the Parry tree increases how often deflections occur under pressure."

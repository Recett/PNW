events:
  - id: talk-hale
    name: Nói chuyện với Đô đốc Hale
    event_type: dialogue
    check:
      - check_type: flag
        flag_data:
          flag_name: char.met_hale
          flag_value: 'true'
          comparison: equals
        success_event: hale-idle-menu
        failure_event: hale-first-meeting
  - id: hale-first-meeting
    name: Đô đốc Hale — Lần Đầu Gặp Mặt
    event_type: dialogue
    message:
      npc_speaker: admiral-hale
      title: Boong Lái
      text: |
        Ông lão đang nhìn ra mặt biển khi ${2p} bước đến. Ông không quay
        lại ngay. Khi quay lại, trên gương mặt ông không có chút ngạc
        nhiên — chỉ là sự chú ý điềm tĩnh của người đã nhận ra ${2p}
        từ trước và chờ xem ${2p} sẽ làm gì với điều đó.

        "${npc_1p} thấy có gương mặt mới. Tốt lắm. Con tàu cần những
        gương mặt mới — để những người cũ khỏi tưởng mình biết hết
        mọi thứ."

        Ông chìa tay ra. Cái bắt tay chắc chắn theo cách không cần
        phải chứng minh điều gì.

        "Edmund Hale. Đô đốc, về mặt chức vụ — dù ${npc_1p} thấy cái
        danh hiệu đó hữu dụng hơn trong văn thư hơn là trong chuyện trò."
      message_type: normal
    action:
      - type: flag
        flag_name: char.met_hale
        flag_value: 'true'
        flag_operation: set
        flag_type: Character
    next: hale-idle-menu
  - id: hale-idle-menu
    name: Đô đốc Hale — Chủ Đề
    event_type: dialogue
    message:
      npc_speaker: admiral-hale
      message_type: normal
      text: |
        Đô đốc đứng trên boong lái, nhìn ra mặt biển.
    option:
      - id: hale-idle-menu-option-1
        text: '"${npc_2p} có khỏe không?"'
        next: hale-topic-how-are-you
        display_order: 1
        button_label: '"${npc_2p} có khỏe không?"'
      - id: hale-idle-menu-option-2
        text: '"${npc_2p} đã đi biển bao lâu rồi?"'
        next: hale-topic-sea
        display_order: 2
        button_label: '"${npc_2p} đã đi biển bao lâu…'
      - id: hale-idle-menu-option-3
        text: '"${npc_2p} có nhớ nhà không?"'
        next: hale-topic-home
        display_order: 3
        button_label: '"${npc_2p} có nhớ nhà không?"'
      - id: hale-idle-menu-option-4
        text: '"${npc_2p} nghĩ sao về chuyến đi này?"'
        next: hale-topic-voyage
        display_order: 4
        button_label: '"${npc_2p} nghĩ sao về chuyến…'
      - id: hale-idle-menu-option-5
        text: Để ông ấy yên.
        next: null
        display_order: 5
        button_label: Để ông ấy yên.
  - id: hale-topic-how-are-you
    name: Hale — Khỏe Không
    event_type: dialogue
    message:
      npc_speaker: admiral-hale
      message_type: normal
      text: |
        "Già rồi. Nhưng ${npc_1p} đã quen với điều đó. Sớm hay muộn
        ${2p} cũng phải quen — không thì ${2p} sẽ dành những năm cuối
        đời nổi giận với một sự thật không thể thay đổi. ${npc_1p}
        chọn cách khác."
    next: hale-idle-menu
  - id: hale-topic-sea
    name: Hale — Thời Gian Trên Biển
    event_type: dialogue
    message:
      npc_speaker: admiral-hale
      message_type: normal
      text: |
        "Bốn mươi ba năm. ${npc_1p} xuống tàu lần đầu lúc mười hai tuổi.
        Ý của cha ${npc_1p} — ông ấy nghĩ biển sẽ rèn giũa ${npc_1p}
        nên người. Ông ấy không sai — chỉ là chắc ông ấy sẽ không nhận
        ra đó là thứ gì."
    next: hale-idle-menu
  - id: hale-topic-home
    name: Hale — Nhà
    event_type: dialogue
    message:
      npc_speaker: admiral-hale
      message_type: normal
      text: |
        "${npc_1p} không còn nhà nữa. Không phải theo nghĩa bi thương —
        chỉ là nó đã thôi là một nơi chốn và trở thành một thói quen.
        Con tàu là nhà. Thủy thủ đoàn là nhà. ${2p} rồi cũng sẽ quen."
    next: hale-idle-menu
  - id: hale-topic-voyage
    name: Hale — Chuyến Đi
    event_type: dialogue
    message:
      npc_speaker: admiral-hale
      message_type: normal
      text: |
        Ông nhìn về phía chân trời trước khi trả lời.

        "Mọi chuyến đi rốt cục đều giống nhau. ${2p} bỏ lại thứ gì đó
        và hy vọng nơi ${2p} đang đến xứng với quãng đường bỏ ra. Chuyến
        này có lợi thế là chỉ về phía nơi chưa ai vẽ được bản đồ. Với
        ${npc_1p}, vậy là tốt hơn."
    next: hale-idle-menu
  - id: talk-york
    name: Nói chuyện với Quân nhu trưởng Waylan
    event_type: dialogue
    check:
      - check_type: flag
        flag_data:
          flag_name: char.met_york
          flag_value: 'true'
          comparison: equals
        success_event: york-idle-menu
        failure_event: york-first-meeting
  - id: york-first-meeting
    name: Quân nhu trưởng York — Lần Đầu Gặp Mặt
    event_type: dialogue
    message:
      npc_speaker: quartermaster-york
      title: Phòng Quân Nhu Trưởng
      message_type: normal
      text: |
        Người đàn ông sau chiếc bàn ngẩng đầu lên khỏi cuốn sổ cái
        trông có vẻ chứa nhiều mục hơn những gì khoảng không gian đó
        có thể hợp lý chứa nổi. Ông không có vẻ ngạc nhiên khi thấy
        ${2p}. Trái lại, trông như thể ông đã ghi ${2p} vào đâu đó
        trong phần lề của cuốn sổ từ trước rồi.

        "À! ${npc_1p} hy vọng ${2p} có chuyến đi thuận lợi? Từ sau xung
        đột với Arbrance, kiểm soát an ninh đã được thắt chặt hơn nhiều.
        Mời ${2p} ngồi đi."

        Ông đặt cuốn sổ sang một bên với sự cẩn thận gọn gàng của người
        chưa bao giờ để thất lạc bất cứ thứ gì trong đời.

        "${npc_1p} là York Waylan — cứ gọi ${npc_1p} là York thôi.
        ${npc_1p} quản lý mọi thứ trên tàu này ngoại trừ việc lái nó —
        và một phần không nhỏ của cả việc lái nữa. Nếu ${2p} cần gì,
        ${npc_1p} là người đúng để hỏi. Nếu ${npc_1p} không có,
        thứ đó không tồn tại."
    action:
      - type: flag
        flag_name: char.met_york
        flag_value: 'true'
        flag_operation: set
        flag_type: Character
    next: york-idle-menu
  - id: york-idle-menu
    name: Quân nhu trưởng York — Chủ Đề
    event_type: dialogue
    message:
      npc_speaker: quartermaster-york
      message_type: normal
      text: |
        York đang ngồi sau bàn làm việc. Một cuốn sổ cái đang mở.
        Hai cuốn khác đang chờ.
    option:
      - id: york-idle-menu-option-1
        text: '"Mọi thứ thế nào rồi, ${npc_2p}?"'
        next: york-topic-things
        display_order: 1
        button_label: '"Mọi thứ thế nào rồi,…'
      - id: york-idle-menu-option-2
        text: '"Công việc của ${npc_2p} cụ thể là gì?"'
        next: york-topic-job
        display_order: 2
        button_label: '"Công việc của ${npc_2p} cụ…'
      - id: york-idle-menu-option-3
        text: '"Lương thực trên tàu còn đủ không?"'
        next: york-topic-supplies
        display_order: 3
        button_label: '"Lương thực trên tàu còn đủ…'
      - id: york-idle-menu-option-4
        text: '"Chuyện gì xảy ra khi chúng ta cập bến?"'
        next: york-topic-colony
        display_order: 4
        button_label: '"Chuyện gì xảy ra khi chúng…'
      - id: york-idle-menu-option-5
        text: Để ông ấy làm việc tiếp.
        next: null
        display_order: 5
        button_label: Để ông ấy làm việc tiếp.
  - id: york-topic-things
    name: York — Mọi Thứ Thế Nào
    event_type: dialogue
    message:
      npc_speaker: quartermaster-york
      message_type: normal
      text: |
        "Tạm ổn. Đó là câu trả lời tốt nhất ${npc_1p} thường nói được,
        và thực lòng đó cũng là mức ${npc_1p} đang nhắm đến. Nếu ${2p}
        muốn câu trả lời thú vị hơn, hãy hỏi ${npc_1p} điều gì cụ thể."
    next: york-idle-menu
  - id: york-topic-job
    name: York — Công Việc
    event_type: dialogue
    message:
      npc_speaker: quartermaster-york
      message_type: normal
      text: |
        "Tất cả những gì giữ cho con tàu vận hành mà không phải là việc
        lái nó. Lương thực, kiểm kê trang thiết bị, hồ sơ thủy thủ, xác
        minh hàng hóa, yêu cầu tiếp liệu, giải quyết khiếu nại — Đô đốc
        lo việc biển. ${npc_1p} lo tất cả những gì biển không quan tâm
        nhưng người ta thì có."

        Ông dừng lại, rồi thêm vào với vẻ khô khan có luyện tập:

        "Danh sách rất dài."
    next: york-idle-menu
  - id: york-topic-supplies
    name: York — Lương Thực
    event_type: dialogue
    message:
      npc_speaker: quartermaster-york
      message_type: normal
      text: |
        "Tạm đủ. May có cá vớt thêm — nhưng kho dự trữ vẫn đang cạn
        nhanh hơn ${npc_1p} muốn, chuyến vượt biển dài nào cũng vậy.
        Chuột là biến số ${npc_1p} không muốn có. ${npc_1p} đã ghi lại
        số lượng hiện tại. ${npc_1p} thích con số đó nhỏ hơn."

        Ông liếc nhìn cuốn sổ như thể nó có thể đã tự cập nhật.

        "Nếu ${2p} có thời gian rảnh, hầm tàu là nơi đáng để dành thời
        gian đó."
    next: york-idle-menu
  - id: york-topic-colony
    name: York — Khi Cập Bến
    event_type: dialogue
    message:
      npc_speaker: quartermaster-york
      message_type: normal
      text: |
        "Điều xảy ra là: chúng ta tự lập chỗ đứng. Đó là lệnh của Vương
        miện và cũng là định nghĩa thực tế của ${npc_1p} về thành công.
        Mọi thứ sau đó là câu hỏi về những quyết định tập thể — định cư
        ở đâu, tổ chức ra sao, ưu tiên cái gì. Những quyết định đó sẽ có
        hệ quả mà ${npc_1p} có thể dự đoán nhưng không thể quyết định."

        Ông nhìn ${2p} với sự chú ý bằng phẳng của người đã nghĩ về điều
        này nhiều hơn ${2p}.

        "${npc_1p} sẽ là người tổ chức quá trình đó. ${npc_1p} khuyên
        ${2p} nên suy nghĩ về nó trước khi chúng ta đến nơi."
    next: york-idle-menu
  - id: talk-vorne
    name: Nói chuyện với Thuyền trưởng Vorne
    event_type: dialogue
    check:
      - check_type: flag
        flag_data:
          flag_name: char.met_vorne
          flag_value: 'true'
          comparison: equals
        success_event: vorne-idle-menu
        failure_event: vorne-first-meeting
  - id: vorne-first-meeting
    name: Thuyền trưởng Vorne — Lần Đầu Gặp Mặt
    event_type: dialogue
    message:
      npc_speaker: captain-vorne
      title: Bánh Lái
      message_type: normal
      text: |
        Thuyền trưởng không ngẩng đầu lên khỏi những tấm hải đồ cho đến
        khi ông sẵn sàng. Khi ngẩng lên, ánh mắt ông đánh giá ${2p}
        nhanh gọn, đầy đủ, và lưu lại.

        "Chào mừng ${2p} lên tàu."

        Ông quay lại với tấm hải đồ, rồi dường như đổi ý, quay lại hẳn.

        "${npc_1p} có ba quy tắc — không chạm vào bánh lái, không chạm
        vào hải đồ của ${npc_1p}, và đừng rơi xuống biển. Hai điều đầu
        ${npc_1p} sẽ thực thi. Điều thứ ba là lời khuyên cá nhân mạnh mẽ."

        Ông không mỉm cười, nhưng có gì đó trong cách nói cho thấy ông
        đã dùng câu này nhiều lần và vẫn cho rằng nó đủ dùng.
    action:
      - type: flag
        flag_name: char.met_vorne
        flag_value: 'true'
        flag_operation: set
        flag_type: Character
    next: vorne-idle-menu
  - id: vorne-idle-menu
    name: Thuyền trưởng Vorne — Chủ Đề
    event_type: dialogue
    message:
      npc_speaker: captain-vorne
      message_type: normal
      text: |
        Thuyền trưởng đứng ở bánh lái. Trông như ông đang suy nghĩ
        ba việc cùng một lúc.
    option:
      - id: vorne-idle-menu-option-1
        text: '"${npc_2p} có chút thời gian không?"'
        next: vorne-topic-moment
        display_order: 1
        button_label: '"${npc_2p} có chút thời gian…'
      - id: vorne-idle-menu-option-2
        text: '"Cho ${1p} biết về con tàu này."'
        next: vorne-topic-ship
        display_order: 2
        button_label: Cho
      - id: vorne-idle-menu-option-3
        text: '"${npc_2p} đã chỉ huy con tàu này bao lâu rồi?"'
        next: vorne-topic-how-long
        display_order: 3
        button_label: '"${npc_2p} đã chỉ huy con tàu…'
      - id: vorne-idle-menu-option-4
        text: '"${npc_2p} cần gì từ thủy thủ đoàn?"'
        next: vorne-topic-crew
        display_order: 4
        button_label: '"${npc_2p} cần gì từ thủy thủ…'
      - id: vorne-idle-menu-option-5
        text: '"${npc_2p} có ổn không?"'
        next: vorne-topic-holding-up
        display_order: 5
        button_label: '"${npc_2p} có ổn không?"'
      - id: vorne-idle-menu-option-6
        text: Để ông ấy làm việc.
        next: null
        display_order: 6
        button_label: Để ông ấy làm việc.
  - id: vorne-topic-moment
    name: Vorne — Chút Thời Gian
    event_type: dialogue
    message:
      npc_speaker: captain-vorne
      message_type: normal
      text: |
        "Chút thôi. ${2p} cần gì?"
    next: vorne-idle-menu
  - id: vorne-topic-ship
    name: Vorne — Con Tàu
    event_type: dialogue
    message:
      npc_speaker: captain-vorne
      message_type: normal
      text: |
        "HMS Divine là một con tàu tốt. Đủ già để đã chứng minh bản thân,
        chưa đủ già để trở thành rủi ro. ${npc_1p} đã chỉ huy tàu tệ hơn
        trong hoàn cảnh tốt hơn, và tàu tốt hơn trong hoàn cảnh tệ hơn.
        Con tàu này sẽ đưa chúng ta đến nơi."
    next: vorne-idle-menu
  - id: vorne-topic-how-long
    name: Vorne — Bao Lâu Rồi
    event_type: dialogue
    message:
      npc_speaker: captain-vorne
      message_type: normal
      text: |
        "Bảy năm. Đủ lâu để thủy thủ đoàn biết ${npc_1p} trông đợi gì và
        ${npc_1p} biết họ có khả năng làm gì. Đó là tất cả những gì của
        việc chỉ huy, nếu rút gọn đến cùng — biết điều gì có thể yêu cầu,
        và của ai."
    next: vorne-idle-menu
  - id: vorne-topic-crew
    name: Vorne — Thủy Thủ Đoàn
    event_type: dialogue
    message:
      npc_speaker: captain-vorne
      message_type: normal
      text: |
        "Kỷ luật và niềm tin, theo thứ tự đó. Kỷ luật ${npc_1p} có thể ra
        lệnh. Niềm tin phải được gây dựng. Chúng ta đang ở giai đoạn cuối
        của một chuyến đi dài và mọi người đã mệt. Điều họ cần là tin rằng
        đích đến xứng với những gì đã bỏ ra. ${npc_1p} đang làm việc
        với điều đó."
    next: vorne-idle-menu
  - id: vorne-topic-holding-up
    name: Vorne — Có Ổn Không
    event_type: dialogue
    message:
      npc_speaker: captain-vorne
      message_type: normal
      text: |
        "Không phải câu hỏi người ta hay hỏi Thuyền trưởng. ${npc_1p} vẫn
        vận hành được. Đó là điều quan trọng. Cảm ơn ${2p} đã hỏi."
    option:
      - id: vorne-topic-holding-up-option-1
        text: '"${1p} không hỏi vậy."'
        next: vorne-topic-holding-up-pressed
        display_order: 1
        button_label: '"${1p} không hỏi vậy."'
      - id: vorne-topic-holding-up-option-2
        text: Chấp nhận câu trả lời.
        next: vorne-idle-menu
        display_order: 2
        button_label: Chấp nhận câu trả lời.
  - id: vorne-topic-holding-up-pressed
    name: Vorne — Có Ổn Không (Hỏi Thêm)
    event_type: dialogue
    message:
      npc_speaker: captain-vorne
      message_type: normal
      text: |
        Một khoảng lặng. Ông nhìn ${2p} khác đi trong chốc lát —
        như thể đang hiệu chỉnh lại.

        "Không. Đúng là không phải vậy. ${npc_1p} đang gánh nhiều hơn
        ${npc_1p} muốn và ít hơn những gì ${npc_1p} có thể đặt xuống.
        Tình hình của Đô đốc là — ${npc_1p} đã biết Edmund Hale mười lăm
        năm. Chỉ nói đến đó thôi."

        Ông quay nhìn về phía chân trời.
    next: vorne-idle-menu
  - id: talk-dag
    name: Nói chuyện với Dag Holt
    event_type: dialogue
    check:
      - check_type: flag
        flag_data:
          flag_name: char.met_dag
          flag_value: 'true'
          comparison: equals
        success_event: dag-idle-menu
        failure_event: dag-first-meeting
  - id: dag-first-meeting
    name: Dag Holt — Lần Đầu Gặp Mặt
    event_type: dialogue
    message:
      npc_speaker: dag-holt
      title: Boong Chính
      message_type: normal
      text: |
        Gã đang mài một con dao rõ ràng không cần mài thêm nữa. Gã nhìn
        lên khi ${2p} đến gần, đánh giá ${2p} bằng một lượt, rồi cất kết
        quả vào đâu đó không vội vàng.

        "Lần đầu đi biển?"

        Gã không chờ câu trả lời lâu.

        "Nghĩ vậy. Lời khuyên — quen sóng cho nhanh, chọn bạn cẩn thận,
        và đừng chạm vào dao của người khác khi chưa hỏi."

        Gã quay lại mài dao. Câu chuyện dường như đã kết thúc trừ khi
        ${2p} quyết định khác.
    action:
      - type: flag
        flag_name: char.met_dag
        flag_value: 'true'
        flag_operation: set
        flag_type: Character
    next: dag-idle-menu
  - id: dag-idle-menu
    name: Dag Holt — Chủ Đề
    event_type: dialogue
    message:
      npc_speaker: dag-holt
      message_type: normal
      text: |
        Dag đang ở boong chính. Có thể đang mài dao. Trông như người có
        nhiều ý kiến chưa ai hỏi đến.
    option:
      - id: dag-idle-menu-option-1
        text: '"${npc_2p} có rảnh không?"'
        next: dag-topic-minute
        display_order: 1
        button_label: '"${npc_2p} có rảnh không?"'
      - id: dag-idle-menu-option-2
        text: '"Kể ${1p} nghe về ${npc_2p} đi."'
        next: dag-topic-himself
        display_order: 2
        button_label: '"Kể ${1p} nghe về ${npc_2p}…'
      - id: dag-idle-menu-option-3
        text: '"Sao ${npc_2p} lại làm lính đánh thuê?"'
        next: dag-topic-mercenary
        display_order: 3
        button_label: Sao
      - id: dag-idle-menu-option-4
        text: '"Sao ${npc_2p} lại tham gia chuyến đi này?"'
        next: dag-topic-voyage
        display_order: 4
        button_label: Sao
      - id: dag-idle-menu-option-5
        text: '"${npc_2p} nghĩ gì về việc chiến đấu?"'
        next: dag-topic-fighting
        display_order: 5
        button_label: '"${npc_2p} nghĩ gì về việc…'
      - id: dag-idle-menu-option-6
        text: '"${1p} muốn luyện tập."'
        next: dag-sparring-intro
        display_order: 6
        button_label: '"${1p} muốn luyện tập."'
      - id: dag-idle-menu-option-7
        text: Để gã yên.
        next: null
        display_order: 7
        button_label: Để gã yên.
  - id: dag-topic-minute
    name: Dag — Có Rảnh Không
    event_type: dialogue
    message:
      npc_speaker: dag-holt
      message_type: normal
      text: |
        "Tùy ${2p} muốn gì."
    next: dag-idle-menu
  - id: dag-topic-himself
    name: Dag — Về Bản Thân
    event_type: dialogue
    message:
      npc_speaker: dag-holt
      message_type: normal
      text: |
        "Lính đánh thuê. Hai mươi năm, tính xấp xỉ. Kiếm thuê, mưu lược
        thuê, giải quyết vấn đề thuê. ${npc_1p} ngừng theo dõi cụ thể ai
        thuê ${npc_1p} vào khoảng năm thứ tám — bắt đầu phức tạp rồi."
    next: dag-idle-menu
  - id: dag-topic-mercenary
    name: Dag — Tại Sao Đánh Thuê
    event_type: dialogue
    message:
      npc_speaker: dag-holt
      message_type: normal
      text: |
        "Không vào quân đội thì chỉ còn đánh thuê. Quân đội có chính trị.
        Đánh thuê có tiền. ${npc_1p} thấy tỷ giá đó chấp nhận được trong
        một thời gian dài."
    next: dag-idle-menu
  - id: dag-topic-voyage
    name: Dag — Tại Sao Chuyến Đi Này
    event_type: dialogue
    message:
      npc_speaker: dag-holt
      message_type: normal
      text: |
        "Hợp đồng. Trả tốt, điểm đến thú vị, Đô đốc tự mình hỏi.
        ${npc_1p} đã làm việc cho Hale trước đây. Ông ấy là một trong
        số ít người đáng làm việc cùng."
    option:
      - id: dag-topic-voyage-option-1
        text: '"Ông ấy nhờ ${npc_2p} làm gì?"'
        next: dag-topic-voyage-pressed
        display_order: 1
        button_label: '"Ông ấy nhờ ${npc_2p} làm gì?"'
      - id: dag-topic-voyage-option-2
        text: Để đó thôi.
        next: dag-idle-menu
        display_order: 2
        button_label: Để đó thôi.
  - id: dag-topic-voyage-pressed
    name: Dag — Hale Nhờ Gì
    event_type: dialogue
    message:
      npc_speaker: dag-holt
      message_type: normal
      text: |
        "Giữ người ta sống. Huấn luyện ai chịu học nghiêm túc. Có ích
        trong giai đoạn đổ bộ. Đó là điều ${npc_1p} đang làm."
    next: dag-idle-menu
  - id: dag-topic-fighting
    name: Dag — Về Chiến Đấu
    event_type: dialogue
    message:
      npc_speaker: dag-holt
      message_type: normal
      text: |
        "Là một công cụ. Như bất kỳ thứ gì khác. Điều quan trọng là
        ${2p} chọn nó vì nó đúng hay vì nó là thứ duy nhất ${2p} có.
        Hầu hết người ta chỉ có một lựa chọn."

        Gã nhìn ${2p}.

        "Câu hỏi đáng tự hỏi không phải là ${2p} có thể chiến đấu không.
        Mà là liệu ${2p} có biết khi nào không nên chiến đấu."
    next: dag-idle-menu
  - id: dag-sparring-intro
    name: Dag — Bắt Đầu Luyện Tập
    event_type: dialogue
    message:
      npc_speaker: dag-holt
      message_type: normal
      text: |
        "Tốt. Ai cũng nghĩ mình biết bước chân. Không ai thực sự biết
        cho đến khi nó được kiểm nghiệm. Đi thôi."
    next: dag-spar-rank1
  - id: talk-petra
    name: Nói chuyện với Petra Vane
    event_type: dialogue
    check:
      - check_type: flag
        flag_data:
          flag_name: char.met_petra
          flag_value: 'true'
          comparison: equals
        success_event: petra-idle-menu
        failure_event: petra-first-meeting
  - id: petra-first-meeting
    name: Petra Vane — Lần Đầu Gặp Mặt
    event_type: dialogue
    message:
      npc_speaker: petra-vane
      title: Lan Can Tàu
      message_type: normal
      text: |
        Cô ấy có mực trên tay, trên má, và bằng cách nào đó cả sau gáy.
        Có ba cuốn sách mở trước mặt cô, không cuốn nào rõ ràng liên quan
        đến nhau. Cô ngẩng đầu lên ngay khi ${2p} vừa đủ gần để nói
        chuyện — cho thấy cô đã nhận ra ${2p} từ trước đó rất lâu.

        "Ồ, chào ${2p}! ${npc_1p} đang hy vọng có người đến — ${npc_1p}
        đang cố tìm hiểu xem màu nước có thay đổi theo quy luật có thể
        dự đoán được không, hay ${npc_1p} đang tự bịa ra một quy luật vì
        ${npc_1p} muốn nó tồn tại."

        Cô không đợi câu trả lời. Đã tiếp tục rồi.

        "${npc_1p} là Petra. ${npc_1p} ở đây với tư cách nghiên cứu lịch
        sử tự nhiên, mà phần lớn có nghĩa là ${npc_1p} ghi chép mọi thứ
        và tranh luận với Cha Clement về ý nghĩa của những ghi chép đó.
        ${2p} làm lĩnh vực gì?"
    action:
      - type: flag
        flag_name: char.met_petra
        flag_value: 'true'
        flag_operation: set
        flag_type: Character
    next: petra-idle-menu
  - id: petra-idle-menu
    name: Petra Vane — Chủ Đề
    event_type: dialogue
    message:
      npc_speaker: petra-vane
      message_type: normal
      text: |
        Petra đang ở lan can với những cuốn sổ tay. Cô ngẩng đầu trước
        khi ${2p} tiến đến hẳn.
    option:
      - id: petra-idle-menu-option-1
        text: '"${npc_2p} đang nghiên cứu gì vậy?"'
        next: petra-topic-working
        display_order: 1
        button_label: '"${npc_2p} đang nghiên cứu gì…'
      - id: petra-idle-menu-option-2
        text: '"${npc_2p} trông đợi tìm thấy gì ở đó?"'
        next: petra-topic-expect
        display_order: 2
        button_label: '"${npc_2p} trông đợi tìm thấy…'
      - id: petra-idle-menu-option-3
        text: '"Làm sao ${npc_2p} chuẩn bị cho điều chưa biết?"'
        next: petra-topic-prepare
        display_order: 3
        button_label: '"Làm sao ${npc_2p} chuẩn bị…'
      - id: petra-idle-menu-option-4
        text: '"${npc_2p} và Cha Clement bất đồng về điều gì?"'
        next: petra-topic-clement
        display_order: 4
        button_label: Cha
      - id: petra-idle-menu-option-5
        text: '"Màu nước — ${npc_2p} đã nhận thấy gì?"'
        next: petra-topic-water
        display_order: 5
        button_label: '"Màu nước — ${npc_2p} đã nhận…'
      - id: petra-idle-menu-option-6
        text: Để cô ấy tiếp tục ghi chép.
        next: null
        display_order: 6
        button_label: Để cô ấy tiếp tục ghi chép.
  - id: petra-topic-working
    name: Petra — Đang Nghiên Cứu Gì
    event_type: dialogue
    message:
      npc_speaker: petra-vane
      message_type: normal
      text: |
        "Phân loại học. Hay đúng hơn là tiền phân loại học — tìm ra những
        danh mục ${npc_1p} sẽ cần trước khi ${npc_1p} thấy bất kỳ thứ gì
        cần phân loại. Đó là loại khoa học kiêu ngạo nhất. ${npc_1p} thích
        nó lắm."
    next: petra-idle-menu
  - id: petra-topic-expect
    name: Petra — Trông Đợi Gì
    event_type: dialogue
    message:
      npc_speaker: petra-vane
      message_type: normal
      text: |
        "Mọi thứ đều sai. ${npc_1p} muốn nói là kỳ vọng của ${npc_1p}
        sẽ sai — không phải thế giới. Thế giới sẽ đúng. Các khung lý
        thuyết của ${npc_1p} sẽ sai, và ${npc_1p} phải xây dựng lại chúng
        ngay tại chỗ. Đó mới là phần thú vị."
    next: petra-idle-menu
  - id: petra-topic-prepare
    name: Petra — Cách Chuẩn Bị
    event_type: dialogue
    message:
      npc_speaker: petra-vane
      message_type: normal
      text: |
        "Bằng cách nắm vững các khung lý thuyết của mình đủ để biết khi
        nào chúng đang vỡ vụn. ${2p} không thể nhận ra bất thường nếu
        không biết bình thường là gì. Vì vậy ${npc_1p} học cái bình thường.
        Rồi chờ thế giới vi phạm nó."
    next: petra-idle-menu
  - id: petra-topic-clement
    name: Petra — Về Cha Clement
    event_type: dialogue
    message:
      npc_speaker: petra-vane
      message_type: normal
      text: |
        "Thực ra không phải bất đồng — đúng hơn là một cuộc đàm phán
        thường trực về cái gì cấu thành lời giải thích. Cha ấy nghĩ mục
        đích có trước quan sát. ${npc_1p} nghĩ quan sát có trước mọi thứ,
        kể cả mục đích. Cả hai đều đúng về phần mà người kia sai. Thực ra
        rất hiệu quả đấy."

        Cô trông thực sự hài lòng về điều này.
    next: petra-idle-menu
  - id: petra-topic-water
    name: Petra — Màu Nước
    event_type: dialogue
    message:
      npc_speaker: petra-vane
      message_type: normal
      text: |
        Cô cho ${2p} xem trang liên quan trong cuốn sổ tay. Có mười hai
        ngày quan sát màu nước ghi bằng nét chữ cẩn thận, tiếp theo là ba
        lần thử xác định quy luật, mỗi lần đều bị gạch bỏ.

        "${npc_1p} chưa biết. Đó là câu trả lời thành thật. Nhưng có gì
        đó đang thay đổi, và nó đang thay đổi theo một hướng, và ${npc_1p}
        muốn biết đầu kia của nó là gì."

        Cô không giải thích thêm về điều cô đang nghĩ đó là gì.
    next: petra-idle-menu
  - id: talk-clement
    name: Nói chuyện với Cha Clement Roe
    event_type: dialogue
    check:
      - check_type: flag
        flag_data:
          flag_name: char.met_clement
          flag_value: 'true'
          comparison: equals
        success_event: clement-idle-menu
        failure_event: clement-first-meeting
  - id: clement-first-meeting
    name: Cha Clement — Lần Đầu Gặp Mặt
    event_type: dialogue
    message:
      npc_speaker: father-clement
      title: Boong Mũi
      message_type: normal
      text: |
        Bộ áo lễ của ông mỏng và sờn cũ theo kiểu của người đi đường
        dài. Ông đang đọc sách — hoặc có vẻ vậy; mắt ông di chuyển trên
        trang giấy với tốc độ cho thấy suy nghĩ nhiều không kém đọc. Ông
        khép sách lại khi ${2p} đến và dành cho ${2p} sự chú ý đầy đủ,
        bình thản nghề nghiệp.

        "À. Một gương mặt mới. Chào mừng. ${npc_1p} là Cha Clement Roe —
        ${npc_1p} phục vụ với tư cách mục vụ, nghĩa là ${npc_1p} ở đây
        để hữu ích cho mọi người theo bất kỳ cách nào họ cần mà không
        cần đến đại bác."

        Một nụ cười rất nhẹ.

        "${npc_1p} thấy biển tốt cho việc suy ngẫm. Biển không cãi lại.
        Cô Vane thì tiếc là có. ${2p} có hay cãi không?"
    action:
      - type: flag
        flag_name: char.met_clement
        flag_value: 'true'
        flag_operation: set
        flag_type: Character
    next: clement-idle-menu
  - id: clement-idle-menu
    name: Cha Clement — Chủ Đề
    event_type: dialogue
    message:
      npc_speaker: father-clement
      message_type: normal
      text: |
        Cha Clement đang ở boong mũi với một cuốn sách. Ông khép nó lại
        khi nhận ra ${2p}.
    option:
      - id: clement-idle-menu-option-1
        text: '"${npc_2p} có lo lắng về những gì chúng ta sẽ tìm thấy không?"'
        next: clement-topic-faith
        display_order: 1
        button_label: '"${npc_2p} có lo lắng về…'
      - id: clement-idle-menu-option-2
        text: '"Cuộc tranh luận với cô Vane của ${npc_2p} đang thế nào?"'
        next: clement-topic-petra
        display_order: 2
        button_label: Vane
      - id: clement-idle-menu-option-3
        text: '"Công việc mục vụ trên tàu trông như thế nào?"'
        next: clement-topic-pastoral
        display_order: 3
        button_label: '"Công việc mục vụ trên tàu…'
      - id: clement-idle-menu-option-4
        text: '"${npc_2p} đang đọc gì vậy?"'
        next: clement-topic-book
        display_order: 4
        button_label: '"${npc_2p} đang đọc gì vậy?"'
      - id: clement-idle-menu-option-5
        text: Để cha tiếp tục đọc sách.
        next: null
        display_order: 5
        button_label: Để cha tiếp tục đọc sách.
  - id: clement-topic-faith
    name: Clement — Về Lo Lắng
    event_type: dialogue
    message:
      npc_speaker: father-clement
      message_type: normal
      text: |
        "Lo lắng ngụ ý ${npc_1p} nghĩ kết quả còn bất định theo những
        cách đáng kể. Những gì chúng ta tìm thấy sẽ là những gì đang ở
        đó. Điều ${npc_1p} băn khoăn là những gì chúng ta mang theo —
        tức là, như thường lệ, chính chúng ta. Lục địa kia không cần
        ${npc_1p} lo lắng. Những người trên con tàu này thì có thể cần."
    next: clement-idle-menu
  - id: clement-topic-petra
    name: Clement — Về Petra
    event_type: dialogue
    message:
      npc_speaker: father-clement
      message_type: normal
      text: |
        "Vẫn chưa kết luận được, đúng như cô ấy mong muốn. Cô Vane là
        người tư duy nghiêm túc, thấy sự chắc chắn đáng ngờ. ${npc_1p}
        thấy sự bất định đáng ngờ. Điều này khiến chúng ${npc_1p} trở
        thành những người trò chuyện xuất sắc và hoàn toàn vô dụng
        trong việc tranh luận."

        Ông nói điều này với rõ ràng sự trìu mến.

        "Cô ấy đã mượn một cuốn sách của ${npc_1p} và có vẻ đã để thất
        lạc đâu đó trên tàu. ${npc_1p} sẽ trân trọng nếu ${2p} có tin
        tức gì về vị trí của nó."
    next: clement-idle-menu
  - id: clement-topic-pastoral
    name: Clement — Công Việc Mục Vụ
    event_type: dialogue
    message:
      npc_speaker: father-clement
      message_type: normal
      text: |
        "Chủ yếu là lắng nghe. Người ta ở trên biển lâu thường nghĩ về
        những điều họ bình thường không nghĩ đến — cái chết, mục đích,
        nơi họ đang đi đến và lý do. ${npc_1p} ở đây cho khi những suy
        nghĩ đó cần chỗ để đi đến mà không phải là đáy cốc."

        Ông dừng lại.

        "Chiếc cốc đôi khi cũng cần thiết. ${npc_1p} không phán xét."
    next: clement-idle-menu
  - id: clement-topic-book
    name: Clement — Cuốn Sách
    event_type: dialogue
    message:
      npc_speaker: father-clement
      message_type: normal
      text: |
        "Một khảo sát về hồ sơ thực vật học ven biển từ các chuyến thám
        hiểm phía nam. Đọc khô khan với hầu hết mọi người. ${npc_1p} thấy
        hữu ích khi biết những gì đã được ghi chép trước — nó mài bén
        ánh mắt cho những gì chưa được ghi."

        Ông lật một trang.

        "Cô Vane và ${npc_1p} có một thỏa thuận. Cô ấy cho ${npc_1p} biết
        những gì cô ấy thấy. ${npc_1p} cho cô ấy biết điều đó có nghĩa gì.
        Cả hai đều giả vờ người kia sai đủ lâu để học được điều gì đó."
    next: clement-idle-menu
  - id: talk-passenger
    name: Nói chuyện với hành khách lạ
    event_type: dialogue
    check:
      - check_type: flag
        flag_data:
          flag_name: char.met_passenger
          flag_value: 'true'
          comparison: equals
        success_event: passenger-idle-menu
        failure_event: passenger-first-meeting
  - id: passenger-first-meeting
    name: Hành Khách Lạ — Lần Đầu Gặp Mặt
    event_type: dialogue
    message:
      npc_speaker: the-passenger
      title: Đuôi Tàu
      message_type: normal
      text: |
        Hắn đứng ở nơi boong tàu thu hẹp dần về phía đuôi, nhìn theo
        vệt sóng. Hắn không có vẻ như người lên tàu vào phút cuối, nhưng
        có gì đó cẩn trọng trong cách hắn chiếm không gian — hiện diện mà
        không gây chú ý, tự nó đã là một kiểu gây chú ý.

        Hắn quay lại khi ${2p} đến gần. Gương mặt hắn được sắp xếp theo
        cách cần thời gian luyện tập.

        "${2p} là người tò mò. ${npc_1p} đã quan sát lộ trình của thủy
        thủ đoàn và ${2p} đi một lộ trình khác mỗi ngày." Hắn nói điều
        này không có vẻ buộc tội. "${npc_1p} chưa quyết định được đó là
        bản năng hay phương pháp."

        Hắn không tự giới thiệu tên.
    action:
      - type: flag
        flag_name: char.met_passenger
        flag_value: 'true'
        flag_operation: set
        flag_type: Character
    next: passenger-idle-menu
  - id: passenger-idle-menu
    name: Hành Khách Lạ — Chủ Đề
    event_type: dialogue
    message:
      npc_speaker: the-passenger
      message_type: normal
      text: |
        Hành khách lạ đứng ở đuôi tàu. Hắn nhìn nhận sự xuất hiện của
        ${2p} bằng một ánh mắt không tiết lộ gì.
    check:
      - check_type: flag
        flag_data:
          flag_name: char.knows_passenger_name
          flag_value: 'true'
          comparison: equals
        success_event: passenger-idle-menu-named
        failure_event: passenger-idle-menu-unnamed
  - id: passenger-idle-menu-unnamed
    name: Hành Khách Lạ — Chủ Đề (Chưa Biết Tên)
    event_type: dialogue
    silent: true
    option:
      - id: passenger-unnamed-option-1
        text: '"${1p} chưa biết tên ${npc_2p}."'
        next: passenger-topic-name
        display_order: 1
        button_label: '"${1p} chưa biết tên…'
      - id: passenger-unnamed-option-2
        text: '"Điều gì khiến ${npc_2p} đến lục địa mới?"'
        next: passenger-topic-destination
        display_order: 2
        button_label: '"Điều gì khiến ${npc_2p} đến…'
      - id: passenger-unnamed-option-3
        text: '"${npc_2p} nghĩ gì về thủy thủ đoàn?"'
        next: passenger-topic-crew
        display_order: 3
        button_label: '"${npc_2p} nghĩ gì về thủy…'
      - id: passenger-unnamed-option-4
        text: '"${npc_2p} nói đã quan sát lộ trình của thủy thủ đoàn."'
        next: passenger-topic-watching
        display_order: 4
        button_label: '"${npc_2p} nói đã quan sát lộ…'
      - id: passenger-unnamed-option-5
        text: Để hắn tiếp tục quan sát.
        next: null
        display_order: 5
        button_label: Để hắn tiếp tục quan sát.
  - id: passenger-idle-menu-named
    name: Hành Khách Lạ — Chủ Đề (Đã Biết Tên)
    event_type: dialogue
    silent: true
    option:
      - id: passenger-named-option-1
        text: '"Điều gì khiến ${npc_2p} đến lục địa mới?"'
        next: passenger-topic-destination
        display_order: 1
        button_label: '"Điều gì khiến ${npc_2p} đến…'
      - id: passenger-named-option-2
        text: '"${npc_2p} nghĩ gì về thủy thủ đoàn?"'
        next: passenger-topic-crew
        display_order: 2
        button_label: '"${npc_2p} nghĩ gì về thủy…'
      - id: passenger-named-option-3
        text: '"${npc_2p} nói đã quan sát lộ trình của thủy thủ đoàn."'
        next: passenger-topic-watching
        display_order: 3
        button_label: '"${npc_2p} nói đã quan sát lộ…'
      - id: passenger-named-option-4
        text: Để hắn tiếp tục quan sát.
        next: null
        display_order: 4
        button_label: Để hắn tiếp tục quan sát.
  - id: passenger-topic-name
    name: Hành Khách — Tên
    event_type: dialogue
    message:
      npc_speaker: the-passenger
      message_type: normal
      text: |
        "Câu hỏi thực tế." Hắn suy nghĩ như thể nó phức tạp hơn bề
        ngoài. "Cứ gọi ${npc_1p} như ${2p} muốn. Tên chủ yếu là thứ
        hành chính trên một con tàu cỡ này."

        Hắn không cho tên.
    next: passenger-idle-menu
  - id: passenger-topic-destination
    name: Hành Khách — Điểm Đến
    event_type: dialogue
    message:
      npc_speaker: the-passenger
      message_type: normal
      text: |
        "Thứ thu hút bất kỳ ai, ${npc_1p} đoán vậy. Khoảng cách với nơi
        họ đã ở. Khả năng rằng điều phía trước khác với điều đã qua."

        Hắn nhìn ra chân trời.

        "Đó là tham vọng hay tuyệt vọng thường phụ thuộc vào ${2p} đang
        đứng ở đầu nào của chuyến đi."
    next: passenger-idle-menu
  - id: passenger-topic-crew
    name: Hành Khách — Về Thủy Thủ Đoàn
    event_type: dialogue
    message:
      npc_speaker: the-passenger
      message_type: normal
      text: |
        "Có năng lực. Hơn hầu hết. Có bốn người trên con tàu này sẽ quan
        trọng khi mọi thứ trở nên tồi tệ — Đô đốc biết họ là ai, dù ông
        chưa nói. Gã lính đánh thuê có danh sách riêng của hắn. Thú vị
        là hai danh sách đó khác nhau."

        Hắn nói điều này như thể đó là một quan sát về thời tiết.
    next: passenger-idle-menu
  - id: passenger-topic-watching
    name: Hành Khách — Về Việc Quan Sát
    event_type: dialogue
    message:
      npc_speaker: the-passenger
      message_type: normal
      text: |
        "Là thói quen. Khi ${2p} dành đủ thời gian trong những căn phòng
        mà lối ra quan trọng, ${2p} bắt đầu tự động để ý đến các lộ trình.
        Tàu chỉ là những căn phòng biết di chuyển."

        Một khoảng lặng.

        "Lộ trình của ${2p} thay đổi nhiều hơn hầu hết. Đó là bản năng
        rất tốt, hoặc dấu hiệu ban đầu của người chưa biết mình đang tìm
        kiếm gì. Cả hai đều thú vị."
    next: passenger-idle-menu

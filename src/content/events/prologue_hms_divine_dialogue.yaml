events:

  # ============================================================
  # YORK WAYLAN
  # ============================================================

  - id: york-approach
    name: "York Waylan —Tiếp Cận"
    event_type: dialogue
    silent: true
    next: york-first-meeting

    check:
      - name: quartermaster-york_known
        type: flag
        flag_data:
          flag_name: char.quartermaster-york_known
          flag_value: 1
          is_global_flag: false
        is_required: false
        silent: true
        on_success: york-hub
        execution_order: 0

  - id: york-first-meeting
    name: "York Waylan —Lần Đầu Gặp Mặt"
    event_type: dialogue
    next: york-hub

    message:
      npc_speaker: quartermaster-york
      message_type: dialogue
      text: |
        Người đàn ông sau chiếc bàn ngẩng đầu lên khỏi cuốn sổ cái trông như chứa nhiều mục hơn mức có thể Ông không có vẻ ngạc nhiên khi thấy ${2p}.

        "À! Mong là ${2p} đã có chuyến đi thuận lợi! Từ sau vụ xung đột với Arbrance kiểm soát an ninh đã được thắt chặt lên gấp nhiều lần. Mời ${2p} ngồi đi."

        Ông đặt cuốn sổ ngay ngắn sang một bên với tất cả sự cẩn thận của người chưa từng để thất lạc bất cứ một thứ gì trong đời.

        "${npc_1p} là York Waylan —cứ gọi ${npc_1p} là York thôi. ${npc_1p} lo liệu mọi thứ trên tàu —trừ việc cầm lái. Mà nói vậy chứ, cả việc cầm lái ${npc_1p} cũng phải nhúng tay không ít. Cần món hàng gì thì cứ hỏi ${npc_1p}."

    action:
      - type: flag
        flag_name: char.quartermaster-york_known
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: york-hub
    name: "York Waylan —Hub"
    event_type: dialogue

    message:
      npc_speaker: quartermaster-york
      message_type: dialogue
      text: "York ngồi sau bàn làm việc. Trước mặt là một cuốn sổ cái mở sẵn, hai cuốn khác đặt bên cạnh đang chờ xử lý."

    option:
      - id: how-things
        text: "Mọi thứ thế nào rồi, ${npc_2p}?"
        next: york-how-things
        display_order: 0

      - id: work
        text: "Công việc của ${npc_2p} cụ thể là gì?"
        next: york-work
        display_order: 1

      - id: food
        text: "Lương thực trên tàu còn đủ không?"
        next: york-food
        display_order: 2

      - id: landing
        text: "Chuyện gì xảy ra khi chúng ta cập bến?"
        next: york-landing
        display_order: 3

      - id: bilge-key
        text: "Chìa khóa hầm tàu biến đâu rồi?"
        next: york-bilge-key
        display_order: 4
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: morale-update
        text: "Về Trung úy Morale..."
        next: york-morale-pregnant
        display_order: 5
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: not_equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: global.cooking_unlocked
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.york_morale_pregnant_told
              flag_value: 1
              flag_comparison: equal
              is_global_flag: false

      - id: shop
        text: "${npc_2p} có trang bị nào dư không?"
        next: york-shop
        display_order: 6

      - id: rapier-training
        text: "${npc_2p} có thể dạy ${1p} cách sử dụng rapier không?"
        next: york-rapier-training
        display_order: 7
        required_check:
          - type: skill
            skill_data:
              skill_id: rapier
              required_level: 1

      - id: turnin
        text: "Tôi có thức ăn cho kho dự trữ."
        next: york-turnin-menu
        display_order: 8

      - id: leave
        text: "Để ${npc_2p} làm việc tiếp."
        display_order: 9

  - id: york-rapier-training
    name: "York Waylan —Huấn Luyện Rapier"
    event_type: dialogue

    message:
      npc_speaker: quartermaster-york
      message_type: dialogue
      text: "York dừng viết, mở một ngăn kéo bên cạnh và lấy ra hai cuốn sách mỏng bìa cứng. 'Rapier là ${npc_1p} dạy — không phải kiếm phổ thông, không phải giáo. Môn này có lịch sử riêng, có trường phái riêng. ${2p} học ${npc_1p} thì học đúng bài.'"

    action:
      - type: shop
        npc: quartermaster-york
        shop_type: perk
        trigger_condition: immediate

  - id: york-shop
    name: "York Waylan —Cửa Hàng"
    event_type: dialogue

    message:
      npc_speaker: quartermaster-york
      message_type: dialogue
      text: "York kéo ra một ngăn kéo phía sau và đặt lên bàn một cuốn danh sách hàng hóa dày cộm. \"Hải quân có một số quân dụng có thể bán ra. Vũ khí, áo giáp —chất lượng vừa phải, giá hợp lý. Mua nhanh kẻo hết.\""

    action:
      - type: shop
        npc: quartermaster-york
        shop_type: item
        trigger_condition: immediate

  - id: york-continue
    name: "York Waylan —Tiếp Tục"
    event_type: dialogue

    message:
      npc_speaker: quartermaster-york
      message_type: dialogue
      text: "\"Còn việc gì nữa không?\""

    option:
      - id: how-things
        text: "Mọi thứ thế nào rồi, ${npc_2p}?"
        next: york-how-things
        display_order: 0

      - id: work
        text: "Công việc của ${npc_2p} cụ thể là gì?"
        next: york-work
        display_order: 1

      - id: food
        text: "Lương thực trên tàu còn đủ không?"
        next: york-food
        display_order: 2

      - id: landing
        text: "Chuyện gì xảy ra khi chúng ta cập bến?"
        next: york-landing
        display_order: 3

      - id: bilge-key
        text: "Chìa khóa hầm tàu biến đâu rồi?"
        next: york-bilge-key
        display_order: 4
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: morale-update
        text: "Về Trung úy Morale..."
        next: york-morale-pregnant
        display_order: 5
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: not_equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: global.cooking_unlocked
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.york_morale_pregnant_told
              flag_value: 1
              flag_comparison: equal
              is_global_flag: false

      - id: leave
        text: "Không có gì. Cảm ơn."
        display_order: 6

  - id: york-how-things
    name: "York —Mọi Thứ Thế Nào"
    event_type: dialogue
    next: york-continue

    message:
      npc_speaker: quartermaster-york
      message_type: dialogue
      text: |
        "Ổn. ${npc_1p} luôn trả lời như vậy — và thường thì như thế đã là quá đủ rồi. Nếu ${2p} muốn nghe điều gì hay ho hơn thì hãy hỏi cho cụ thể nhé."

  - id: york-work
    name: "York —Công Việc"
    event_type: dialogue
    next: york-continue

    message:
      npc_speaker: quartermaster-york
      message_type: dialogue
      text: |
        "Tất cả những gì giữ cho con tàu vận hành mà không phải là việc lái nó. Lương thực, kiểm kê trang thiết bị, hồ sơ thủy thủ, xác minh hàng hóa, tiếp tế, giải quyết khiếu nại —Nói chung thuyền trưởng lo chuyện ngoài biển. Còn ${npc_1p} gánh vác toàn bộ phần còn lại."

        "Để mà kể tường tận thì dài lắm."

  - id: york-food
    name: "York —Lương Thực"
    event_type: dialogue
    next: york-continue

    message:
      npc_speaker: quartermaster-york
      message_type: dialogue
      text: |
        "Tạm đủ. May có cá vớt thêm —nhưng kho dự trữ vẫn đang cạn nhanh hơn ${npc_1p} muốn, chuyến vượt biển dài nào cũng vậy. Đám chuột nhắt là thứ ${npc_1p} không muốn phải tính đến. Số lượng hiện tại của chúng đã được ghi lại… và thú thật là ${npc_1p} muốn con số đó vơi bớt."

        Ông liếc nhìn cuốn sổ như thể nó có thể đã tự cập nhật.

        "Nếu rảnh, đáy tàu là nơi ${2p} nên cân nhắc ghé qua đó."

    action:
      - type: flag
        flag_name: char.york_mentioned_bilge
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: york-landing
    name: "York —Khi Cập Bến"
    event_type: dialogue
    next: york-continue

    message:
      npc_speaker: quartermaster-york
      message_type: dialogue
      text: |
        "Điều xảy ra là: chúng ta tự lập chỗ đứng. Đó là lệnh của Vương miện —cũng là định nghĩa của ${npc_1p} về thành công, nói thực tế mà. Mọi thứ sau đó là câu hỏi về những quyết định tập thể—định cư ở đâu, tổ chức ra sao, ưu tiên cái gì. Những quyết định đó sẽ có hậu quả mà ${npc_1p} có thể dự đoán nhưng không thể quyết định."

        Ông nhìn ${2p} với sự chú ý bằng phẳng của người đã nghĩ về điều này nhiều hơn ${2p}.

        "${npc_1p} sẽ là người gánh vác cũng như tổ chức toàn bộ quá trình đó. Và ${npc_1p} khuyên ${2p} cũng nên bắt đầu để tâm suy nghĩ về nó trước khi chúng ta cập bến."


  # ============================================================
  # ALDRIC VORNE
  # ============================================================

  - id: vorne-approach
    name: "Vorne —Tiếp Cận"
    event_type: dialogue
    silent: true
    next: vorne-first-meeting

    check:
      - name: captain-vorne_known
        type: flag
        flag_data:
          flag_name: char.captain-vorne_known
          flag_value: 1
          is_global_flag: false
        is_required: false
        silent: true
        on_success: vorne-hub
        execution_order: 0

  - id: vorne-first-meeting
    name: "Vorne —Lần Đầu Gặp Mặt"
    event_type: dialogue
    next: vorne-hub

    message:
      npc_speaker: captain-vorne
      message_type: dialogue
      text: |
        Thuyền trưởng không ngẩng đầu lên khỏi những tấm hải đồ cho đến khi ông sẵn sàng. Khi ngẩng lên, ông ghi nhận ${2p} nhanh, đủ, rồi xếp lại.

        "Chào mừng ${2p} lên tàu."

        Ông quay lại với tấm hải đồ, rồi dường như đổi ý, quay lại hẳn.

        "${npc_1p} có ba quy tắc đơn giản: đừng chạm vào bánh lái, đừng chạm vào hải đồ của ${npc_1p}, và tuyệt đối đừng rơi xuống biển. Hai quy tắc đầu ${npc_1p} sẽ trực tiếp đảm bảo, không để cho nó xảy ra. Còn quy tắc thứ ba… thì nó giống một lời khuyên cá nhân đáng lưu tâm hơn."

        Ông không mỉm cười, nhưng có gì đó trong cách nói cho thấy ông đã dùng câu này nhiều lần và vẫn cho rằng nó đủ dùng.

        "Aldric Vorne. ${npc_1p} chỉ huy con tàu này."

    action:
      - type: flag
        flag_name: char.captain-vorne_known
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: vorne-hub
    name: "Vorne —Hub"
    event_type: dialogue

    message:
      npc_speaker: captain-vorne
      message_type: dialogue
      text: "Thuyền trưởng đứng ở bánh lái."

    option:
      - id: journey
        text: "Còn bao lâu nữa thì đến nơi?"
        next: vorne-journey-ahead
        display_order: 0

      - id: ship
        text: "HMS Divine —${1p} chưa từng thấy con tàu nào như vậy."
        next: vorne-ship
        display_order: 1

      - id: how-long
        text: "${npc_2p} đã chỉ huy con tàu này bao lâu rồi?"
        next: vorne-how-long
        display_order: 2

      - id: bilge-key
        text: "Chìa khóa hầm tàu —${npc_2p} có biết không?"
        next: vorne-bilge-key
        display_order: 3
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: leave
        text: "Để ${npc_2p} làm việc."
        display_order: 4

  - id: vorne-continue
    name: "Vorne —Tiếp Tục"
    event_type: dialogue

    message:
      npc_speaker: captain-vorne
      message_type: dialogue
      text: "\"Lại gì nữa đây?\""

    option:
      - id: journey
        text: "Còn bao lâu nữa thì đến nơi?"
        next: vorne-journey-ahead
        display_order: 0

      - id: ship
        text: "HMS Divine —${1p} chưa từng thấy con tàu nào như vậy."
        next: vorne-ship
        display_order: 1

      - id: how-long
        text: "${npc_2p} đã chỉ huy con tàu này bao lâu rồi?"
        next: vorne-how-long
        display_order: 2

      - id: bilge-key
        text: "Chìa khóa hầm tàu —${npc_2p} có biết không?"
        next: vorne-bilge-key
        display_order: 3
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: leave
        text: "Không có gì."
        display_order: 4

  - id: vorne-ship
    name: "Vorne —Con Tàu"
    event_type: dialogue
    next: vorne-continue

    message:
      npc_speaker: captain-vorne
      message_type: dialogue
      text: |
        "HMS Divine là một con tàu tốt. Nó đã tồn tại đủ lâu để chứng minh giá trị bản thân, nhưng chưa lâu đến mức để phải xếp ngang với một đống gỗ vụn. ${npc_1p} đã chỉ huy tàu tệ hơn trong hoàn cảnh tốt hơn, và tàu tốt hơn trong hoàn cảnh tệ hơn. Tin ${2p} đi, Nhất định con tàu này sẽ đưa chúng ta tới nơi cần đến."

  - id: vorne-journey-ahead
    name: "Vorne —Chuyến Đi Phía Trước"
    event_type: dialogue

    message:
      npc_speaker: captain-vorne
      message_type: dialogue
      text: |
        "Nửa đầu không có gì đáng ngại. Biển Antica —tên cũ của vùng này —về cơ bản là biển bình thường. Gió mây thì dễ đoán, dòng chảy lại ổn định."

        Ông nhìn ra chân trời.

        "Tuy vậy, đi hết nửa đầu, ${2p} sẽ thấy mây sẫm lại ở đằng xa. Dòng chảy bắt đầu thất thường. Gió đổi chiều không theo quy luật. Đó là ranh giới."

        "Từ đó trở đi là Biển Hỗn Loạn."

    option:
      - id: chaotic-sea
        text: "Biển Hỗn Loạn trông như thế nào?"
        next: vorne-chaotic-sea
        display_order: 0

      - id: nod
        text: "Gật đầu."
        next: vorne-continue
        display_order: 1

  - id: vorne-chaotic-sea
    name: "Vorne —Biển Hỗn Loạn"
    event_type: dialogue
    next: vorne-continue

    message:
      npc_speaker: captain-vorne
      message_type: dialogue
      text: |
        "Bên trong đó, dòng chảy và gió trở nên vô lý. La bàn thông thường chết hoàn toàn. Giữ một hướng thẳng cũng không được —dòng nước và gió sẽ buộc tàu xoay theo những góc không thể đoán trước."

        "Chỉ duy nhất La Bàn Konrad là hoạt động được ở đó. Tuy không có khả năng chỉ phương hướng như la bàn thường, nhưng nó lại có thể cho ${2p} biết được khi nào cần rẽ, và phải rẽ thế nào để giữ tàu đúng hướng giữa dòng chảy điên loạn của biển cả. Không có nó, ${2p} không biết mình đang ở đâu, không kiểm soát được tàu, và đôi khi có kiểm soát được cũng không biết phải đi về phía nào."

        "Đó là lý do phần lớn tàu luôn một đi không trở lại."

        "Mà Biển Hỗn Loạn thực ra gồm hai khúc. Khúc đầu là Biển Hiểm —dòng chảy và gió loạn như ${npc_1p} vừa mô tả. Vượt qua khúc đó là Biển Sương —dòng chảy ổn định hơn, nhưng sương mù dày đặc, mặt trời không xuyên qua được. ${2p} hầu như không thấy gì phía trước. Đôi khi thấy —nhưng không phải lúc nào cũng là thật."

        "Có thể đã từng có những con tàu vượt qua cả hai khúc đó. Nhưng khổ nỗi, chúng ta lại chẳng có nhân chứng sống nào cả."

  - id: vorne-how-long
    name: "Vorne —Bao Lâu Rồi"
    event_type: dialogue
    next: vorne-continue

    message:
      npc_speaker: captain-vorne
      message_type: dialogue
      text: |
        "Bảy năm. Đủ lâu để thủy thủ đoàn biết ${npc_1p} trông đợi gì và ${npc_1p} biết họ có khả năng làm gì. Đó là cốt lõi của việc chỉ huy. Nói cho gọn thì đó là biết mình có thể đòi hỏi điều gì, và đòi hỏi điều ấy từ ai."


  # ============================================================
  # IAN McBETHA
  # ============================================================

  - id: mcbetha-approach
    name: "McBetha —Tiếp Cận"
    event_type: dialogue
    silent: true
    next: mcbetha-first-meeting

    check:
      - name: ian-mcbetha_known
        type: flag
        flag_data:
          flag_name: char.ian-mcbetha_known
          flag_value: 1
          is_global_flag: false
        is_required: false
        silent: true
        on_success: mcbetha-hub
        execution_order: 0

  - id: mcbetha-first-meeting
    name: "Cha McBetha —Lần Đầu Gặp Mặt"
    event_type: dialogue
    next: mcbetha-hub

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: |
        Bộ áo lễ của ông mỏng và sờn cũ theo kiểu của người đi đường dài. Ông đang đọc sách —hoặc có vẻ vậy; ông khép sách lại khi ${2p} đến và dành cho ${2p} sự chú ý đầy đủ.

        "À. Một gương mặt mới. Chào mừng. ${npc_1p} là Linh mục Ian McBetha —${npc_1p} phục vụ với tư cách mục vụ, nghĩa là ${npc_1p} ở đây để giúp đỡ mọi người theo những cách mà không cần đến dao kiếm hay bạo lực."

        Một nụ cười rất nhẹ.

        "${npc_1p} thấy biển tốt cho việc suy ngẫm. Biển không cãi lại. Cô Vane thì tiếc là có. ${2p} có phải một con người thường xuyên lời qua tiếng lại với người khác không?"

    action:
      - type: flag
        flag_name: char.ian-mcbetha_known
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: mcbetha-hub
    name: "McBetha —Hub"
    event_type: dialogue

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: "${npc_name} đang ở boong mũi với một cuốn sách. Ông khép nó lại khi nhận ra ${2p}."

    option:

        next: hensbane-training-gate
        display_order: 6
        hidden_check:
          - type: flag
            flag_data:
              flag_name: char.hensbane_rank
              flag_value: 5
              flag_comparison: greater_equal
              is_global_flag: false

      - id: bilge-key
        text: "Chìa khóa hầm tàu —${npc_2p} biết ai có không?"
        next: hensbane-bilge-key
        display_order: 7
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1

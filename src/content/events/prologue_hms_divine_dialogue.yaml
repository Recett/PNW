  - id: mcbetha-worry
    name: "McBetha — Về Lo Lắng"
    event_type: dialogue
    next: mcbetha-continue

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: |
        "${npc_1p} lo lắng về cách chúng ta sẽ hành xử khi tìm thấy. Việc tìm ra thì dễ. Còn làm gì sau đó —liệu chúng ta có xứng với cuộc gặp gỡ đó không —đó mới là điều khiến ${npc_1p} trăn trở. Lục địa kia không cần ${npc_1p} lo lắng. Những người trên con tàu này thì có thể cần."

  - id: mcbetha-pastoral
    name: "McBetha —Công Việc Mục Vụ"
    event_type: dialogue
    next: mcbetha-continue

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: |
        "Chủ yếu là lắng nghe. Người ta ở trên biển lâu thường nghĩ về những điều họ bình thường không nghĩ đến —cái chết, mục đích, nơi họ đang đi đến và lý do. ${npc_1p} ở đây để những suy nghĩ đó có chỗ đến —mà không phải là đáy cốc."

        Ông dừng lại.

        "Chiếc cốc đôi khi cũng cần thiết. ${npc_1p} không phán xét."

  - id: mcbetha-book
    name: "McBetha —Cuốn Sách"
    event_type: dialogue
    next: mcbetha-continue

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: |
        "Một khảo sát về hồ sơ thực vật học ven biển từ các chuyến thám hiểm phía nam. Đọc khô khan với hầu hết mọi người. ${npc_1p} thấy hữu ích khi biết những gì đã được ghi chép trước —giúp nhận ra những gì chưa được ghi."

        Ông lật một trang.

        "Cô Vane và ${npc_1p} có một thỏa thuận. Cô ấy cho ${npc_1p} biết những gì cô ấy thấy. ${npc_1p} cho cô ấy biết điều đó có nghĩa gì. Cả hai đều giả vờ người kia sai đủ lâu để học được điều gì đó."



        "À, không có gì. Chỉ là nhớ lại chuyện cũ. Hai mươi năm trước ${npc_1p} trôi dạt vào bờ một bộ tộc nhỏ, họ giữ ${npc_1p} lại một thời gian, chữa vết thương rồi để${npc_1p} đi. Ban ngày họđi săn, thịt mang vềnấu chung, cả làng ăn cùng nhau, mỗi tối đám thợ săn kể lại chuyến đi trong ngày, ai săn được nhiều thì nói nhiều hơn."


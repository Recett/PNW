events:

  # ============================================================
  # YORK WAYLAN
  # ============================================================

  - id: york-approach
    name: "York Waylan —Tiếp Cận"
    event_type: dialogue
    silent: true
    next: york-first-meeting

    checks:
      - name: quartermaster-york_known
        type: flag
        flag_data:
          flag_name: char.quartermaster-york_known
          flag_value: 1
          is_global_flag: false
        is_required: false
        silent: true
        on_success: york-hub
        execution_order: 0

  - id: york-first-meeting
    name: "York Waylan —Lần Đầu Gặp Mặt"
    event_type: dialogue
    next: york-hub

    message:
      npc_speaker: york-waylan
      message_type: dialogue
      text: |
        Người đàn ông sau chiếc bàn ngẩng đầu lên khỏi cuốn sổ cái trông như chứa nhiều mục hơn mức có thể Ông không có vẻ ngạc nhiên khi thấy ${2p}.

        "${npc_1p} hy vọng ${2p} có chuyến đi thuận lợi? Từ sau xung đột với Arbrance, kiểm soát an ninh đã được thắt chặt hơn nhiều. Mời ${2p} ngồi đi."

        Ông đặt cuốn sổ sang một bên với sự cẩn thận gọn gàng của người chưa bao giờ để thất lạc bất cứ thứ gì trong đời.

        "${npc_1p} là York Waylan —cứ gọi ${npc_1p} là York thôi. ${npc_1p} quản lý mọi thứ trên tàu này ngoại trừ việc lái nó —và một phần không nhỏ của cả việc lái nữa. Nếu ${2p} cần gì, ${npc_1p} là người đúng để hỏi. Nếu ${npc_1p} không có, thứ đó không tồn tại."

    actions:
      - type: flag
        flag_name: char.quartermaster-york_known
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: york-hub
    name: "York Waylan —Hub"
    event_type: dialogue

    message:
      npc_speaker: york-waylan
      message_type: dialogue
      text: "York đang ngồi sau bàn làm việc. Một cuốn sổ cái đang mở Hai cuốn khác đang chờ"

    options:
      - id: how-things
        text: "Mọi thứ thế nào rồi, ${npc_2p}?"
        next: york-how-things
        display_order: 0

      - id: work
        text: "Công việc của ${npc_2p} cụ thể là gì?"
        next: york-work
        display_order: 1

      - id: food
        text: "Lương thực trên tàu còn đủ không?"
        next: york-food
        display_order: 2

      - id: landing
        text: "Chuyện gì xảy ra khi chúng ta cập bến?"
        next: york-landing
        display_order: 3

      - id: bilge-key
        text: "Chìa khóa hầm tàu biến đâu rồi?"
        next: york-bilge-key
        display_order: 4
        hidden_checks:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: morale-update
        text: "Về Trung úy Morale..."
        next: york-morale-pregnant
        display_order: 5
        hidden_checks:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: not_equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: global.cooking_unlocked
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.york_morale_pregnant_told
              flag_value: 1
              flag_comparison: equal
              is_global_flag: false

      - id: shop
        text: "${npc_2p} có trang bị nào dư không?"
        next: york-shop
        display_order: 6

      - id: leave
        text: "Để ${npc_2p} làm việc tiếp."
        display_order: 7

  - id: york-shop
    name: "York Waylan —Cửa Hàng"
    event_type: dialogue

    message:
      npc_speaker: york-waylan
      message_type: dialogue
      text: "York kéo ra một ngăn kéo phía sau và đặt lên bàn một cuốn danh sách hàng hóa dày cộm. \"Hải quân có một sềEquân dụng có thểbán ra. Vũ khí, áo giáp —chất lượng vừa phải, giá hợp lý. Mua nhanh kẻo hết.\""

    actions:
      - type: shop
        npc: quartermaster-york
        shop_type: item
        trigger_condition: immediate

  - id: york-continue
    name: "York Waylan —Tiếp Tục"
    event_type: dialogue

    message:
      npc_speaker: york-waylan
      message_type: dialogue
      text: "\"Còn việc gì không?\""

    options:
      - id: how-things
        text: "Mọi thứ thế nào rồi, ${npc_2p}?"
        next: york-how-things
        display_order: 0

      - id: work
        text: "Công việc của ${npc_2p} cụ thểlà gì?"
        next: york-work
        display_order: 1

      - id: food
        text: "Lương thực trên tàu còn đủ không?"
        next: york-food
        display_order: 2

      - id: landing
        text: "Chuyện gì xảy ra khi chúng ta cập bến?"
        next: york-landing
        display_order: 3

      - id: bilge-key
        text: "Chìa khóa hầm tàu biến đâu rồi?"
        next: york-bilge-key
        display_order: 4
        hidden_checks:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: morale-update
        text: "VềTrung úy Morale..."
        next: york-morale-pregnant
        display_order: 5
        hidden_checks:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: not_equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: global.cooking_unlocked
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.york_morale_pregnant_told
              flag_value: 1
              flag_comparison: equal
              is_global_flag: false

      - id: leave
        text: "Không có gì. Cảm ơn."
        display_order: 6

  - id: york-how-things
    name: "York —Mọi Thứ Thế Nào"
    event_type: dialogue
    next: york-continue

    message:
      npc_speaker: york-waylan
      message_type: dialogue
      text: |
        "Tạm ổn. Đó là câu trả lời tốt nhất ${npc_1p} thường nói được, và thực lòng đó cũng là mức ${npc_1p} đang nhắm đến. Nếu ${2p} muốn câu trả lời thú vị hơn, hãy hỏi ${npc_1p} điều gì cụ thể"

  - id: york-work
    name: "York —Công Việc"
    event_type: dialogue
    next: york-continue

    message:
      npc_speaker: york-waylan
      message_type: dialogue
      text: |
        "Tất cả những gì giữ cho con tàu vận hành mà không phải là việc lái nó. Lương thực, kiểm kê trang thiết bị, hồ sơ thủy thủ, xác minh hàng hóa, tiếp tế, giải quyết khiếu nại —Đô đốc lo việc biển. ${npc_1p} lo tất cả những gì biển không quan tâm nhưng người ta thì có."

        "Danh sách rất dài."

  - id: york-food
    name: "York —Lương Thực"
    event_type: dialogue
    next: york-continue

    message:
      npc_speaker: york-waylan
      message_type: dialogue
      text: |
        "Tạm đủ. May có cá vớt thêm —nhưng kho dự trữ vẫn đang cạn nhanh hơn ${npc_1p} muốn, chuyến vượt biển dài nào cũng vậy. Chuột là thứ ${npc_1p} không muốn tính đến. ${npc_1p} đã ghi lại số lượng hiện tại. ${npc_1p} thích con số đó nhiều hơn."

        Ông liếc nhìn cuốn sổ như thể nó có thể đã tự cập nhật.

        "Nếu ${2p} có thời gian rảnh, hầm tàu là nơi đáng để dành thời gian đó."

    actions:
      - type: flag
        flag_name: char.york_mentioned_bilge
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: york-landing
    name: "York —Khi Cập Bến"
    event_type: dialogue
    next: york-continue

    message:
      npc_speaker: york-waylan
      message_type: dialogue
      text: |
        "Điều xảy ra là: chúng ta tự lập chỗ đứng. Đó là lệnh của Vương miện —cũng là định nghĩa của ${npc_1p} về thành công, nói thực tế mà. Mọi thứ sau đó là câu hỏi về những quyết định tập thể—định cư ở đâu, tổ chức ra sao, ưu tiên cái gì. Những quyết định đó sẽ có hậu quả mà ${npc_1p} có thể dự đoán nhưng không thể quyết định."

        Ông nhìn ${2p} với sự chú ý bằng phẳng của người đã nghĩ vềđiều này nhiều hơn ${2p}.

        "${npc_1p} sẽ là người tổ chức quá trình đó. ${npc_1p} khuyên ${2p} nên suy nghĩ về nó trước khi chúng ta đến nơi."


  # ============================================================
  # ALDRIC VORNE
  # ============================================================

  - id: vorne-approach
    name: "Vorne —Tiếp Cận"
    event_type: dialogue
    silent: true
    next: vorne-first-meeting

    checks:
      - name: captain-vorne_known
        type: flag
        flag_data:
          flag_name: char.captain-vorne_known
          flag_value: 1
          is_global_flag: false
        is_required: false
        silent: true
        on_success: vorne-hub
        execution_order: 0

  - id: vorne-first-meeting
    name: "Vorne —Lần Đầu Gặp Mặt"
    event_type: dialogue
    next: vorne-hub

    message:
      npc_speaker: aldric-vorne
      message_type: dialogue
      text: |
        Thuyền trưởng không ngẩng đầu lên khỏi những tấm hải đồ cho đến khi ông sẵn sàng. Khi ngẩng lên, ông ghi nhận ${2p} nhanh, đủ, rồi xếp lại.

        "Chào mừng ${2p} lên tàu."

        Ông quay lại với tấm hải đồ, rồi dường như đổi ý, quay lại hẳn.

        "${npc_1p} có ba quy tắc —không chạm vào bánh lái, không chạm vào hải đồ của ${npc_1p}, và đừng rơi xuống biển. Hai điều đầu ${npc_1p} sẽ thực thi. Điều thứ ba là lời khuyên cá nhân mạnh mẽ."

        Ông không mỉm cười, nhưng có gì đó trong cách nói cho thấy ông đã dùng câu này nhiều lần và vẫn cho rằng nó đủ dùng.

        "Aldric Vorne. ${npc_1p} chỉhuy con tàu này."

    actions:
      - type: flag
        flag_name: char.captain-vorne_known
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: vorne-hub
    name: "Vorne —Hub"
    event_type: dialogue

    message:
      npc_speaker: aldric-vorne
      message_type: dialogue
      text: "Thuyền trưởng đứng ở bánh lái."

    options:
      - id: journey
        text: "Còn bao lâu nữa thì đến nơi?"
        next: vorne-journey-ahead
        display_order: 0

      - id: ship
        text: "HMS Divine —${1p} chưa từng thấy con tàu nào như vậy."
        next: vorne-ship
        display_order: 1

      - id: how-long
        text: "${npc_2p} đã chỉ huy con tàu này bao lâu rồi?"
        next: vorne-how-long
        display_order: 2

      - id: bilge-key
        text: "Chìa khóa hầm tàu —${npc_2p} có biết không?"
        next: vorne-bilge-key
        display_order: 3
        hidden_checks:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: leave
        text: "Để${npc_2p} làm việc."
        display_order: 4

  - id: vorne-continue
    name: "Vorne —Tiếp Tục"
    event_type: dialogue

    message:
      npc_speaker: aldric-vorne
      message_type: dialogue
      text: "\"Gì nữa?\""

    options:
      - id: journey
        text: "Còn bao lâu nữa thì đến nơi?"
        next: vorne-journey-ahead
        display_order: 0

      - id: ship
        text: "HMS Divine —${1p} chưa từng thấy con tàu nào như vậy."
        next: vorne-ship
        display_order: 1

      - id: how-long
        text: "${npc_2p} đã chỉhuy con tàu này bao lâu rồi?"
        next: vorne-how-long
        display_order: 2

      - id: bilge-key
        text: "Chìa khóa hầm tàu —${npc_2p} có biết không?"
        next: vorne-bilge-key
        display_order: 3
        hidden_checks:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: leave
        text: "Không có gì."
        display_order: 4

  - id: vorne-ship
    name: "Vorne —Con Tàu"
    event_type: dialogue
    next: vorne-continue

    message:
      npc_speaker: aldric-vorne
      message_type: dialogue
      text: |
        "HMS Divine là một con tàu tốt. Đủ già để đã chứng minh bản thân, chưa đủ già để trở thành rủi ro. ${npc_1p} đã chỉ huy tàu tệ hơn trong hoàn cảnh tốt hơn, và tàu tốt hơn trong hoàn cảnh tệ hơn. Con tàu này sẽ đưa chúng ta đến nơi."

  - id: vorne-journey-ahead
    name: "Vorne —Chuyến Đi Phía Trước"
    event_type: dialogue

    message:
      npc_speaker: aldric-vorne
      message_type: dialogue
      text: |
        "Nửa đầu không có gì đáng ngại. Biển Antica —tên cũ của vùng này —vềcơ bản là biển bình thường. Gió đoán được, dòng chảy ổn định."

        Ông nhìn ra chân trời.

        "Đến khoảng giữa đường, ${2p} sẽ thấy mây sẫm lại ở phía xa. Dòng chảy bắt đầu thất thường. Gió đổi chiều không theo quy luật. Đó là ranh giới."

        "Từ đó trở đi là Biển Hỗn Loạn."

    options:
      - id: chaotic-sea
        text: "Biển Hỗn Loạn trông như thế nào?"
        next: vorne-chaotic-sea
        display_order: 0

      - id: nod
        text: "Gật đầu."
        next: vorne-continue
        display_order: 1

  - id: vorne-chaotic-sea
    name: "Vorne —Biển Hỗn Loạn"
    event_type: dialogue
    next: vorne-continue

    message:
      npc_speaker: aldric-vorne
      message_type: dialogue
      text: |
        "Bên trong đó, dòng chảy và gió trở nên vô lý. La bàn thông thường chết hoàn toàn. Giữ một hướng thẳng cũng không được —dòng nước và gió sẽ buộc tàu xoay theo những góc không thể đoán trước."

        "Chỉ có La Bàn Konrad hoạt động được ềEđó. Nó không chỉ đường như la bàn thông thường —nó chỉ cho ${2p} biết khi nào cần rẽ, và rẽ thế nào, để tàu đi đúng hướng giữa dòng chảy điên loạn. Không có nó, ${2p} không biết mình đang ở đâu, không kiểm soát được tàu, và đôi khi có kiểm soát được cũng không biết phải đi về phía nào."

        "Đó là lý do tàu thường không trở về từ đó."

        "Biển Hỗn Loạn thực ra có hai phần. Phần đầu là Biển Hiểm —dòng chảy và gió loạn như ${npc_1p} vừa mô tả. Vượt qua đó là Biển Sương —dòng chảy ổn định hơn, nhưng sương mù dày đặc, mặt trời không xuyên qua được. ${2p} hầu như không thấy gì phía trước. Đôi khi thấy —nhưng không phải lúc nào cũng là thật."

        "Có lẽ đã có những con tàu vượt qua cả hai phần đó trong quá khứ. Nhưng họ không thể quay về để kể lại."

  - id: vorne-how-long
    name: "Vorne —Bao Lâu Rồi"
    event_type: dialogue
    next: vorne-continue

    message:
      npc_speaker: aldric-vorne
      message_type: dialogue
      text: |
        "Bảy năm. Đủ lâu để thủy thủ đoàn biết ${npc_1p} trông đợi gì và ${npc_1p} biết họ có khả năng làm gì. Đó là tất cả những gì của việc chỉ huy, nếu rút gọn đến cùng —biết điều gì có thể yêu cầu, và của ai."


  # ============================================================
  # IAN McBETHA
  # ============================================================

  - id: mcbetha-approach
    name: "McBetha —Tiếp Cận"
    event_type: dialogue
    silent: true
    next: mcbetha-first-meeting

    checks:
      - name: ian-mcbetha_known
        type: flag
        flag_data:
          flag_name: char.ian-mcbetha_known
          flag_value: 1
          is_global_flag: false
        is_required: false
        silent: true
        on_success: mcbetha-hub
        execution_order: 0

  - id: mcbetha-first-meeting
    name: "Cha McBetha —Lần Đầu Gặp Mặt"
    event_type: dialogue
    next: mcbetha-hub

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: |
        Bộ áo lễ của ông mỏng và sờn cũ theo kiểu của người đi đường dài. Ông đang đọc sách —hoặc có vẻ vậy; ông khép sách lại khi ${2p} đến và dành cho ${2p} sự chú ý đầy đủ.

        "À. Một gương mặt mới. Chào mừng. ${npc_1p} là Linh mục Ian McBetha —${npc_1p} phục vụ với tư cách mục vụ, nghĩa là ${npc_1p} ở đây để hữu ích cho mọi người theo cách không cần đến đại bác."

        Một nụ cười rất nhẹ.

        "${npc_1p} thấy biển tốt cho việc suy ngẫm. Biển không cãi lại. Cô Vane thì tiếc là có. ${2p} có hay cãi không?"

    actions:
      - type: flag
        flag_name: char.ian-mcbetha_known
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: mcbetha-hub
    name: "McBetha —Hub"
    event_type: dialogue

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: "${npc_name} đang ở boong mũi với một cuốn sách. Ông khép nó lại khi nhận ra ${2p}."

    options:
      - id: worry
        text: "${npc_2p} có lo lắng về những gì chúng ta sẽ tìm thấy không?"
        next: mcbetha-worry
        display_order: 0

      - id: pastoral
        text: "Công việc mục vụ trên tàu trông như thế nào?"
        next: mcbetha-pastoral
        display_order: 1

      - id: book

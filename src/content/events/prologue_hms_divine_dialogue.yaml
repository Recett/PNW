  - id: hensbane-available
    name: "Hensbane —Có Rảnh Không"
    event_type: dialogue
    next: hensbane-continue

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "Nếu ${2p} cần hỏi chuyện hoặc luyện tập thì ${npc_1p} luôn có thời gian. Công việc của ${npc_1p} trên tàu này chủ yếu là giữ cho mọi người sẵn sàng khi có chuyện xảy ra, nên nói chuyện với những người muốn học cũng nằm trong phần việc đó."

  - id: hensbane-about
    name: "Hensbane — Về Bản Thân"
    event_type: dialogue
    next: hensbane-continue

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "Lawrence Hensbane, đội trưởng Claw Company. ${npc_1p} làm lính đánh thuê gần như cả đời trưởng thành của mình, bắt đầu từ những hợp đồng hộ tống nhỏ ở tuyến thương mại phía bắc rồi dần chuyển sang những nhiệm vụ lớn hơn. Sau vài năm, ${npc_1p} được giao quyền chỉ huy đơn vị và từ đó đến giờ vẫn giữ vị trí này."

        "${npc_1p} không có câu chuyện gì đặc biệt để kể. Làm đủ lâu trong nghề này thì mọi thứ trở nên khá giống nhau: nhận hợp đồng, hoàn thành công việc, giữ người của mình sống sót, rồi chuyển sang nhiệm vụ tiếp theo. Điều duy nhất thay đổi thường là địa điểm và mức độ rắc rối."

  - id: hensbane-claw-company
    name: "Hensbane —Claw Company"
    event_type: dialogue
    next: hensbane-continue

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "Claw Company là một đơn vị lính đánh thuê quy mô nhỏ hoạt động chủ yếu ở những khu vực mà quân đội chính quy không muốn triển khai lực lượng lâu dài. Chúng tôi nhận các hợp đồng bảo vệ đoàn hàng, hộ tống thương nhân, giữ an ninh cho đoàn thám hiểm hoặc xử lý những mối đe dọa nhỏ trước khi chúng trở thành vấn đề lớn."

        "Đơn vị được thành lập khoảng mười hai năm trước bởi một cựu sĩ quan biên phòng. Sau khi ông ta chết trong một hợp đồng, quyền chỉ huy được chuyển qua vài người rồi đến ${npc_1p}. Từ đó đến giờ cách hoạt động vẫn giữ nguyên: hợp đồng rõ ràng, nhiệm vụ rõ ràng, trả công đúng hạn, và không dính vào những chuyện vượt quá phạm vi công việc."

        "Chúng tôi không phải quân đội và cũng không giả vờ là quân đội. Chúng tôi chỉ là những người được thuê để làm việc khó, và làm cho xong."

  - id: hensbane-why-joined
    name: "Hensbane —Tham Gia Chuyến Đi"
    event_type: dialogue
    next: hensbane-continue

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "Chuyến đi này là một hợp đồng lớn và ổn định, đó là lý do chính. Một đoàn thám hiểm quy mô như vậy cần lực lượng an ninh riêng, và phía tổ chức muốn có người huấn luyện chiến đấu cho những người không quen với nguy hiểm. Claw Company phù hợp với yêu cầu đó, nên chúng tôi nhận việc."

        "Những chuyến đi dài thường phát sinh vấn đề mà không ai dự đoán trước được: tranh chấp, hoảng loạn, tai nạn, hoặc đơn giản là con người hành động sai trong thời điểm tồi tệ. Có một đơn vị quen xử lý rủi ro đi cùng sẽ giúp mọi thứ ổn định hơn, và đó là vai trò của chúng tôi."

        "Với ${npc_1p}, đây chỉ là một công việc khác, nhưng là công việc đáng nhận vì quy mô và điều kiện khá rõ ràng."

  - id: hensbane-combat-thoughts
    name: "Hensbane — Về Chiến Đấu"
    event_type: dialogue
    next: hensbane-continue

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "Chiến đấu thực ra không phức tạp như nhiều người nghĩ. Phần lớn vấn đề không nằm ở kỹ thuật mà nằm ở cách người ta phản ứng khi đối mặt nguy hiểm. Người giữ được bình tĩnh thường sống lâu hơn người chỉ biết đánh mạnh."

        "Trong thực tế, chiến đấu là kỹ năng để kiểm soát tình huống, không phải để chứng minh điều gì. Nếu tránh được thì tránh, nếu buộc phải làm thì làm nhanh và gọn, và quan trọng nhất là hiểu khi nào nên dừng. Những người không hiểu điểm đó thường không trụ được lâu trong nghề này."

        "Nếu ${2p} muốn học, ${npc_1p} sẽ dạy theo cách thực tế nhất có thể không có động tác thừa và không có lý thuyết không cần thiết."

  - id: hensbane-training-gate
    name: "Hensbane —Training Gate"
    event_type: dialogue
    silent: true
    next: hensbane-too-tired

    check:
      - name: stamina_check
        type: stat
        stat_data:
          stat_name: currentStamina
          stat_comparison: greater_equal
          stat_value: 10
        is_required: false
        silent: true
        on_success: hensbane-training

  - id: hensbane-too-tired
    name: "Hensbane —Quá Mệt"
    event_type: dialogue
    next: hensbane-continue

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: "Hensbane nhìn ${2p} một lượt rồi lắc đầu. \"${2p} trông mệt. Luyện lúc này sẽ chỉ học sai cách, không ích gì. Nghỉ ngơi đã, khi nào khỏe thì quay lại.\""

  - id: hensbane-training
    name: "Hensbane —Luyện Tập"
    event_type: dialogue
    next: hensbane-training-dispatch

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "Được, chúng ta có thể bắt đầu ngay. ${npc_1p} sẽ kiểm tra phản xạ và cách ${2p} giữ thăng bằng trước, sau đó mới đến kỹ thuật cơ bản. Buổi đầu chỉ để xem ${2p} đang ở mức nào, nên không cần lo lắng về kết quả."

        "Chỉ cần giữ bình tĩnh và làm theo hướng dẫn. Mục tiêu của buổi tập là hiểu cách cơ thể phản ứng khi bị ép, không phải thắng thua."

        "Chuẩn bị xong thì bắt đầu."

    action:
      - type: variable
        variable_name: pre_spar_hp
        source_type: stat
        source_name: currentHp
        silent: true
      - type: stat
        stat_name: currentStamina
        value: "-10"
        operation: add
        silent: true

  - id: hensbane-training-dispatch
    name: "Hensbane —Training Dispatch"
    description: "Selects sparring rank based on cleared rank flags. Checks from highest to lowest; first match wins."
    event_type: dialogue
    silent: true
    next: hensbane-combat-r1

    check:
      - name: rank_max
        type: flag
        flag_data:
          flag_name: char.hensbane_rank
          flag_value: 5
          flag_comparison: greater_equal
          is_global_flag: false
        is_required: false
        silent: true
        on_success: hensbane-max-rank
        execution_order: 0

      - name: rank_4
        type: flag
        flag_data:
          flag_name: char.hensbane_rank
          flag_value: 4
          flag_comparison: equal
          is_global_flag: false
        is_required: false
        silent: true
        on_success: hensbane-combat-r5
        execution_order: 1

      - name: rank_3
        type: flag
        flag_data:
          flag_name: char.hensbane_rank
          flag_value: 3
          flag_comparison: equal
          is_global_flag: false
        is_required: false

      npc_speaker: lawrence-hensbane
      message_type: dialogue
      text: |
        "Kết quả như vậy là tốt. ${2p} giữ được nhịp di chuyển và không hoảng khi bị ép, điều đó cho thấy phản xạ cơ bản đã ổn. Với nền tảng này, nếu luyện thêm vài buổi thì ${2p} có thể xử lý những tình huống đơn giản mà không gặp quá nhiều khó khăn."

        "Vẫn còn điểm cần chỉnh, đặc biệt là lực đánh và cách giữ khoảng cách, nhưng đó là chuyện bình thường với người mới. Không ai làm đúng hết ngay từ đầu."

        "Nếu có thời gian, quay lại luyện thêm. Kỹ năng này chỉ tiến bộ khi được lặp lại đủ nhiều."

  - id: hensbane-sparring-loss
    name: "Hensbane —Sparring Thua"
    event_type: dialogue
    next: hensbane-end

    message:
      npc_speaker: lawrence-hensbane
      message_type: dialogue
      text: |
        "Không vấn đề gì. Phản xạ ban đầu của ${2p} còn chậm và cách giữ trọng tâm chưa ổn, nên khi bị ép thì rất khó lấy lại thế chủ động. Đây là lỗi phổ biến với người chưa quen luyện tập, và hoàn toàn có thể sửa được."

        "Quan trọng là ${2p} đã hiểu cảm giác khi bịáp lực trực tiếp, và đó là bước đầu cần thiết. Sau vài buổi luyện, cơ thể sẽ tự điều chỉnh nhanh hơn."

        "Muốn thử lại thì cứ quay lại vào lúc khác, ${npc_1p} sẽ tiếp tục hướng dẫn."

  - id: hensbane-end
    name: "Hensbane —Kết Thúc Buổi Tập"
    event_type: dialogue

    message:
      npc_speaker: lawrence-hensbane
      message_type: dialogue
      text: |
        "Hôm nay vậy là đủ. Tập quá nhiều trong một lần thường không giúp tiến bộ nhanh hơn, chỉ khiến cơ thể mệt và phản xạ chậm đi."

        "Khi nào muốn luyện tiếp thì cứ tìm ${npc_1p} trên boong. ${npc_1p} thường ở quanh khu vực này."

        "Giữ sức cho hành trình phía trước."



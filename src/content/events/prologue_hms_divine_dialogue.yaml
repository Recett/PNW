  - id: hensbane-perk-shop
    name: "Hensbane —Huấn Luyện Kỹ Năng"
    event_type: dialogue

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: "Hensbane gật đầu. \"${npc_1p} có thể dạy ${2p} một vài kỹ thuật cơ bản. Tốn thời gian và công sức —nhưng nếu ${2p} thực sự muốn học thì ${npc_1p} không từ chối.\""

    action:
      - type: shop
        npc: law-hensbane

  - id: hensbane-announce-check-r5
    name: "Hensbane —First Win Check Rank 5"
    event_type: dialogue
    silent: true
    next: hensbane-announce-r5

    check:
      - name: r5-already-announced
        type: flag
        flag_data:
          flag_name: "global.hensbane_r5_first"
          flag_value: 1
          flag_comparison: equal
          is_global_flag: true
        is_required: false
        silent: true
        on_success: hensbane-sparring-win

  - id: hensbane-announce-r5
    name: "Hensbane —First Win Announce Rank 5"
    event_type: dialogue
    next: hensbane-sparring-win

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "Khá lắm! Đã lâu rồi chưa có ai đánh được như vậy. Đây, cái này cho cậu."

    action:
      - type: flag
        flag_name: global.hensbane_r5_first
        flag_value: 1
        flag_operation: set
        flag_type: global
        silent: true
      - type: item
        item: claw-company-greatsword
        quantity: "1"
        operation: give
        silent: false
      - type: narrate
        channel: storyboard
        title: "Rank 5 — Người Đầu Tiên"
        text: |
          Không thể tin nổi! Sau một trận đấu tập khốc liệt không thua gì một trận chiến thực sự, **${player_name}** vừa trở thành người đầu tiên vượt qua được Hensbane nghiêm túc!

          Liệu đây có phải là khởi đầu của một huyền thoại Tân Thế Giới? Chỉ thời gian mới trả lời được, nhưng chắc chắn một điều: mọi người trên tàu sẽ không bao giờ quên được cái tên **${player_name}** sau chiến thắng này!

  - id: hensbane-sparring-win
    name: "Hensbane —Sparring Thắng"
    event_type: dialogue
    next: hensbane-end

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "Kết quả như vậy là tốt. ${2p} đã có thể giữ nhịp di chuyển và không hoảng loạn trước sức ép. Phản xạ cơ bản thì ổn rồi. Cứ đà này thì luyện thêm vài buổi là ${2p} đã có thể xử lý những tình huống đơn giản."

        "Vẫn còn điểm cần chỉnh, đặc biệt là lực đánh và cách giữ khoảng cách, nhưng đó là chuyện bình thường với người mới. Không ai làm đúng hết ngay từ đầu."

        "Nếu có thời gian, hãy quay lại luyện thêm. Văn ôn võ luyện thì hẵng mong có kết quả."

  - id: hensbane-sparring-loss
    name: "Hensbane —Sparring Thua"
    event_type: dialogue
    next: hensbane-end

    action:
      - type: stat
        stat_name: currentHp
        value: "${pre_spar_hp}"
        operation: set
        silent: true

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "Không vấn đề gì. Phản xạ ban đầu của ${2p} còn chậm và cách giữ trọng tâm chưa ổn, nên khi bị ép thì rất khó lấy lại thế chủ động. Đây là lỗi phổ biến với người chưa quen luyện tập, và hoàn toàn có thể sửa được."

        "Ít ra ${2p} đã biết cảm giác bị ép là thế nào. Thứ đó không học qua lời nói được đâu."

        "Muốn thử lại thì cứ nói. ${npc_1p} sẽ tiếp tục hướng dẫn."

  - id: hensbane-max-rank
    name: "Hensbane —Max Rank"
    event_type: dialogue
    next: hensbane-continue

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "${npc_1p} lắc đầu nhẹ. \"${2p} đã qua hết những gì ${npc_1p} có thể dạy trên tàu này. Luyện thêm với ${npc_1p} lúc này sẽ không giúp ${2p} tiến bộ thêm được bao nhiêu.\""

        "\"Phần còn lại là thực chiến và kinh nghiệm thực tế. Muốn giỏi hơn thì phải ra ngoài gặp tình huống thật.\""

  - id: hensbane-end
    name: "Hensbane —Kết Thúc Buổi Tập"
    event_type: dialogue

    message:
      npc_speaker: law-hensbane
      message_type: dialogue
      text: |
        "Hôm nay như vậy là quá đủ rồi. Tập quá nhiều trong một buổi thường không đem lại kết quả tốt đâu. Chỉ tổ khiến cho cơ thể mệt và phản xạ chậm đi thôi."

        "Khi nào muốn luyện tiếp thì cứ tìm ${npc_1p} trên boong. ${npc_1p} thường ở quanh khu vực này."

        "Nhớ phải giữ gìn sức khỏe cho hành trình phía trước nhé."


  # ============================================================
  # JOHN GALEBY
  # ============================================================

  - id: galeby-approach
    name: "Galeby —Tiếp Cận"
    description: "Dispatcher. Checks evaluated in execution_order; first on_success should short-circuit. Verify engine behaviour before deploying."
    event_type: dialogue
    silent: true
    next: galeby-first-meeting

    check:
      - name: visit_5_done
        type: flag
        flag_data:
          flag_name: char.gale_met
          flag_value: 5
          flag_comparison: greater_equal
          is_global_flag: false
        is_required: false
        silent: true
        on_success: galeby-all-done
        execution_order: 0

      - name: visit_4_done
        type: flag
        flag_data:
          flag_name: char.gale_met
          flag_value: 4
          is_global_flag: false
        is_required: false
        silent: true
        on_success: galeby-fifth-meeting
        execution_order: 1

      - name: visit_3_done
        type: flag
        flag_data:
          flag_name: char.gale_met
          flag_value: 3
          is_global_flag: false
        is_required: false
        silent: true
        on_success: galeby-fourth-meeting
        execution_order: 2

      - name: visit_2_done
        type: flag
        flag_data:
          flag_name: char.gale_met
          flag_value: 2
          is_global_flag: false
        is_required: false
        silent: true
        on_success: galeby-third-meeting
        execution_order: 3

      - name: visit_1_done
        type: flag
        flag_data:
          flag_name: char.gale_met
          flag_value: 1
          is_global_flag: false
        is_required: false
        silent: true
        on_success: galeby-second-meeting
        execution_order: 4

  - id: galeby-first-meeting
    name: "Galeby —Lần Gặp Đầu"
    event_type: dialogue

    message:
      message_type: dialogue
      text: |
        Một ông lão mặc chiếc áo khoác bạc màu đứng bên mạn tàu. Ánh mắt ông hướng ra mặt nước phẳng lặng, đôi tay tựa lên lan can gỗ một cách thong thả.

    option:
      - id: weather
        text: "Gió hôm nay lạnh thật, ${npc_2p} nhỉ"
        next: galeby-weather
        display_order: 0

      - id: observing
        text: "${npc_2p} đang nhìn gì ngoài đó vậy?"
        next: galeby-observing
        display_order: 1

      - id: silence
        text: "(Đứng cạnh ${npc_2p}, im lặng nhìn biển)"
        next: galeby-silence
        display_order: 2

      - id: bilge-key
        text: "Chìa khóa hầm tàu —${npc_2p} có biết không?"
        next: galeby-bilge-key
        display_order: 3
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: leave
        text: "(Rời đi.)"
        display_order: 4

  - id: galeby-weather
    name: "Galeby —Lần 0 / Thời Tiết"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        "Ừ, càng ra xa bờ gió thổi càng gắt. ${2p} nên vào trong nếu không có áo dày, đứng ngoài này dễ cảm lạnh lắm."

    action:
      - type: flag
        flag_name: char.galeby_talked_today
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: galeby-observing
    name: "Galeby —Lần 0 / Quan Sát"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        "Cũng không có gì đặc biệt. Đứng đây một lát cho thoáng để tí nữa xuống khoang nằm cho dễ ngủ thôi."

    action:
      - type: flag
        flag_name: char.galeby_talked_today
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: galeby-silence
    name: "Galeby —Lần 0 / Im Lặng"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        Sau một lúc, ông khẽ nhích sang một bên để nhường chỗ trên lan can. Cả hai cùng đứng đó nhìn mặt nước sủi bọt trắng xóa bên mạn tàu.
        "Đứng không thế này lại hay," ông lẩm bẩm. "Dưới khoang ồn ào quá."

    action:
      - type: flag
        flag_name: char.galeby_talked_today
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: galeby-second-meeting
    name: "Galeby —Lần Gặp Thứ Hai"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        Ông lão vẫn đứng ở vị trí cũ, tay gõ nhịp nhẹ lên lan can gỗ. Thấy ${2p}, ông khẽ gật đầu chào.

    option:
      - id: curious
        text: "Kể tên quê nhà."
        next: galeby-hometown
        display_order: 0

      - id: nomadic
        text: "Bốn bể là nhà."
        next: galeby-many-places
        display_order: 1

      - id: bilge-key
        text: "Chìa khóa hầm tàu —${npc_2p} có biết không?"
        next: galeby-bilge-key
        display_order: 2
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: leave
        text: "Thôi, để ${npc_2p} yên."
        display_order: 3

  - id: galeby-hometown
    name: "Galeby —Lần 1 / Quê Nhà"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        Ông nhắc lại tên, vẻ như đang nhớ lại.

        "${npc_1p} biết tên đó." Ông gật đầu nhẹ. "Sao ${2p} lại rời nơi đó mà đi?"

    action:
      - type: flag
        flag_name: char.galeby_talked_today
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

    option:
      - id: world
        text: "Muốn xem thế giới."
        next: galeby-visit-1-end
        display_order: 0

      - id: nothing-left
        text: "Không còn gì để ở lại."
        next: galeby-visit-1-end
        display_order: 1

      - id: dont-know
        text: "Không biết nữa."
        next: galeby-visit-1-end
        display_order: 2

  - id: galeby-many-places
    name: "Galeby —Lần 1 / Bốn Bể Là Nhà"
    event_type: dialogue
    next: galeby-visit-1-end

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        "${npc_1p} hiểu." Ông gật đầu chậm rãi. "Hồi trẻ ${npc_1p} cũng vậy. Cứ đi mãi, đi mãi... đến lúc ngoảnh lại thì chẳng còn nhớ nổi đất quê mình có mùi ra sao nữa."

    action:
      - type: flag
        flag_name: char.galeby_talked_today
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: galeby-visit-1-end
    name: "Galeby —Lần 1 / Kết"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        Ông nhìn ra biển một lúc lâu.

        "Chuyến này chắc hẳn là chuyến cuối của ${npc_1p}. Cập bến xong, ${npc_1p} sẽ tìm một góc nào đó nghỉ ngơi. Hơn hai mươi năm lênh đênh, sương gió cũng nếm đủ rồi." Ông ngoảnh mặt bước đi.

    action:
      - type: flag
        flag_name: char.galeby_talked_today
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: galeby-third-meeting
    name: "Galeby —Lần Gặp Thứ Ba"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        Galeby đứng tựa vào lan can, gõ nhẹ chiếc tẩu rỗng xuống gỗ Khi thấy ${2p} đến gần, ông khẽ gật đầu.

    action:
      - type: flag
        flag_name: char.john-galeby_known
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

    option:
      - id: thoughts
        text: "${npc_2p} đang nghĩ gì vậy?"
        next: galeby-thoughts
        display_order: 0

      - id: concerned
        text: "Biển hôm nay có vẻ động."
        next: galeby-thoughts-concerned
        display_order: 1

      - id: bilge-key
        text: "Chìa khóa hầm tàu —${npc_2p} có biết không?"
        next: galeby-bilge-key
        display_order: 2
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: leave
        text: "Thôi, để ${npc_2p} yên."
        display_order: 3

  - id: galeby-thoughts
    name: "Galeby —Lần 2 / Suy Nghĩ"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        Ông ngẩng đầu nhìn ra mặt nước.

        "Cái màu nước xanh này làm ${npc_1p} nhớ tới vùng biển phía Đông. Hai mươi năm trước, tàu của ${npc_1p} bị đắm ở chỗ đó. Mười bảy người trôi dạt lên một bãi cát trắng. Suốt mấy ngày trời chẳng có gì bỏ bụng ngoài mấy con ốc nhỏ tí."

        "${npc_1p} vẫn hay tự hỏi không biết chốn ấy giờ ra sao... Hay là sóng biển đã xóa sạch mọi dấu vết của tụi ${npc_1p} năm đó rồi."

    action:
      - type: flag
        flag_name: char.galeby_talked_today
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: galeby-thoughts-concerned
    name: "Galeby —Lần 2 / Bận Tâm"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        Ông nhìn ra mặt nước, khẽ lắc đầu.

        "Không có gì, chỉ là nhớ lại chuyện cũ. Cái màu nước xanh này làm ${npc_1p} nhớ tới vùng biển phía Đông. Hai mươi năm trước, tàu của ${npc_1p} bị đắm ở chỗ đó. Mười bảy người trôi dạt lên một bãi cát trắng. Suốt mấy ngày trời chẳng có gì bỏ bụng ngoài mấy con ốc nhỏ tí."

        "${npc_1p} vẫn hay tự hỏi không biết chốn ấy giờ ra sao... Hay là sóng biển đã xóa sạch mọi dấu vết của tụi ${npc_1p} năm đó rồi."

    action:
      - type: flag
        flag_name: char.galeby_talked_today
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: galeby-fourth-meeting
    name: "Galeby —Lần Gặp Thứ Tư"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        Khi thấy ${2p} đến gần, Galeby đứng thẳng người dậy. Đôi vai ông hơi chùng xuống, vẻ mặt nặng trĩu suy tư

    option:
      - id: tired
        text: "Trông ${npc_2p} có vẻ mệt mỏi."
        next: galeby-share
        display_order: 0

      - id: has-something
        text: "${npc_2p} có chuyện muốn nói sao?"
        next: galeby-share
        display_order: 1

      - id: leave
        text: "Thôi, để ${npc_2p} yên."
        display_order: 2

  - id: galeby-share
    name: "Galeby —Lần 3 / Lời Nhắn"
    event_type: dialogue
    next: galeby-end-choice

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        "${npc_1p} không mệt, chỉ là dạo này cứ nhắm mắt lại là thấy họ. Những người ở bộ tộc năm đó... Nếu không nhờ họ cưu mang thì ${npc_1p} đã chìm xác ở cái xó xỉnh nào rồi. Nợ ơn cứu mạng mà chẳng biết đường nào quay lại để trả."

        "${npc_1p} giờ đã không còn sức... Sau này nếu ${2p}... thấy ai mang hình xăm sói... để ý giúp... Chỉ cần biết cô ấy vẫn bình yên là đủ."

    action:
      - type: flag
        flag_name: char.galeby_quest_aela
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true
      - type: flag
        flag_name: char.galeby_talked_today
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

  - id: galeby-end-choice
    name: "Galeby —Lần 3 / Kết (Phân Nhánh)"
    description: "First player gets spear, second gets rapier, all others get nothing. Global flags set by ending events."
    event_type: dialogue
    silent: true
    next: galeby-end-no-gift

    check:
      - name: spear_available
        type: flag
        flag_data:
          flag_name: global.galeby_spear_taken
          flag_value: 1
          is_global_flag: true
        is_required: false
        silent: true
        on_failure: galeby-end-spear
        execution_order: 0

      - name: rapier_available
        type: flag
        flag_data:
          flag_name: global.galeby_rapier_taken
          flag_value: 1
          is_global_flag: true
        is_required: false
        silent: true
        on_failure: galeby-end-rapier
        execution_order: 1

  - id: galeby-end-spear
    name: "Galeby —Kết / Ngọn Thương"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        "Cái này vốn là của họ. ${npc_1p} mang theo nó suốt hai mươi năm qua như một kỷ vật."

        "Nếu sau này ${2p} tìm thấy họ, hãy trả nó về đúng chỗ giúp ${npc_1p}. Kỷ vật thì nên tìm đường về đúng nhà của nó." Ông bước đi.

    action:
      - type: flag
        flag_name: global.galeby_spear_taken
        flag_value: 1
        flag_operation: set
        flag_type: global
        silent: true
      - type: item
        item: galeby-wolf-spear
        quantity: "1"
        operation: give
        silent: false

  - id: galeby-end-rapier
    name: "Galeby —Kết / Thanh Rapier"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        "Cầm lấy đi. Thanh kiếm này theo ${npc_1p} cũng lâu rồi, giờ cầm thấy nặng tay quá. Để nó cạnh một lão già đã gần đất xa trời thì chỉ tổ phí hoài. Hãy dùng nó vào việc có ích hơn đi."

        Ông đặt thanh rapier lên lan can rồi khẽ gật đầu bước đi.

    action:
      - type: flag
        flag_name: global.galeby_rapier_taken
        flag_value: 1
        flag_operation: set
        flag_type: global
        silent: true
      - type: item
        item: galeby-rapier
        quantity: "1"
        operation: give
        silent: false

  - id: galeby-end-no-gift
    name: "Galeby —Kết / Không Tặng Quà"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        "Cảm ơn ${2p} đã nghe ${npc_1p} lải nhải chuyện xưa. Chỉ cần nhớ giúp cái tên đó là đủ rồi."

        Ông khẽ gật đầu rồi bước đi.

  - id: galeby-fifth-meeting
    name: "Galeby —Lần Gặp Thứ Năm"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        Galeby đứng nhìn ra biển. Ánh mắt ông dán về phía chân trời.

        "Trời hôm nay quang đãng."

    option:
      - id: career
        text: "${npc_2p} đã đi biển bao lâu rồi?"
        next: galeby-career
        display_order: 0

      - id: silence
        text: "(Đứng cạnh ${npc_2p} nhìn ra biển)"
        next: galeby-fifth-silence
        display_order: 1

      - id: leave
        text: "(Rời đi.)"
        display_order: 2

  - id: galeby-career
    name: "Galeby —Lần 4 / Sự Nghiệp"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        "Hơn hai mươi năm lênh đênh trên biển. Chừng ấy thời gian là đủ để biết lúc nào nên nghỉ ngơi rồi."

  - id: galeby-fifth-silence
    name: "Galeby —Lần 4 / Im Lặng"
    event_type: dialogue

    message:
      npc_speaker: john-galeby
      message_type: dialogue
      text: |
        Ông không nói gì. Hai người đứng cạnh nhau nhìn ra chân trời, nơi mặt nước và bầu trời gặp nhau trong một đường thẳng sắc.

  - id: galeby-all-done
    name: "Galeby —Không Còn Gì Để Nói"
    description: "State after all five meetings are complete. Wire to appropriate location behavior."
    event_type: dialogue
    silent: true

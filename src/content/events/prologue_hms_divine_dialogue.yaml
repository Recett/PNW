              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: leave
        text: "Để ${npc_2p} tiếp tục đọc sách."
        display_order: 4

  - id: mcbetha-continue
    name: "McBetha —Tiếp Tục"
    event_type: dialogue

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: "\"Con còn điều gì trăn trở không?\""

    option:
      - id: worry
        text: "${npc_2p} có lo lắng về những gì chúng ta sẽ tìm thấy không?"
        next: mcbetha-worry
        display_order: 0

      - id: pastoral
        text: "Công việc mục vụ trên tàu trông như thế nào?"
        next: mcbetha-pastoral
        display_order: 1

      - id: book
        text: "${npc_2p} đang đọc gì vậy?"
        next: mcbetha-book
        display_order: 2

      - id: bilge-key
        text: "Chìa khóa hầm tàu —${npc_2p} có hay biết không?"
        next: mcbetha-bilge-key
        display_order: 3
        hidden_check:
          - type: flag
            flag_data:
              flag_name: global.morale_name_revealed
              flag_value: 1
              flag_comparison: equal
              is_global_flag: true
          - type: flag
            flag_data:
              flag_name: char.bilge_door_encountered
              flag_value: "1"
              flag_comparison: not_equal
              is_global_flag: false

      - id: leave
        text: "Không có gì. Cảm ơn ${npc_2p}."
        display_order: 4

  - id: mcbetha-worry
    name: "McBetha — Về Lo Lắng"
    event_type: dialogue
    next: mcbetha-continue

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: |
        "${npc_1p} lo lắng về cách chúng ta sẽ hành xử khi tìm thấy. Việc tìm ra thì dễ. Còn làm gì sau đó —liệu chúng ta có xứng với cuộc gặp gỡ đó không —đó mới là điều khiến ${npc_1p} trăn trở. Lục địa kia có thể không cần ${npc_1p} lo. Nhưng những người trên con tàu này… thì có."

  - id: mcbetha-pastoral
    name: "McBetha —Công Việc Mục Vụ"
    event_type: dialogue
    next: mcbetha-continue

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: |
        "Chủ yếu là lắng nghe. Người ta ở trên biển lâu thường nghĩ về những điều họ bình thường không nghĩ đến —cái chết, mục đích, nơi họ đang đi đến và lý do. ${npc_1p} ở đây để họ có thể nói ra những điều ấy —thay vì giữ trong lòng, hoặc tìm đến rượu."

        Ông dừng lại.

        "Dù vậy, đôi khi tìm đến rượu cũng là một lựa chọn đúng đắn. ${npc_1p} không phán xét hay gì đâu."

  - id: mcbetha-book
    name: "McBetha —Cuốn Sách"
    event_type: dialogue
    next: mcbetha-continue

    message:
      npc_speaker: ian-mcbetha
      message_type: dialogue
      text: |
        "Một khảo sát về hồ sơ thực vật học ven biển từ các chuyến thám hiểm phía nam. Đọc khô khan với hầu hết mọi người, nhưng ${npc_1p} lại thấy thật hữu ích khi có thể dựa vào những gì đã được ghi chép để khám phá ra cái mới, những gì chưa tồn tại trong sách vở."

        Ông lật một trang.

        "Cô Vane và ${npc_1p} có một thỏa thuận. Cô ấy cho ${npc_1p} biết những gì cô ấy thấy. ${npc_1p} giúp cô ấy tìm hiểu về ý nghĩa của chúng. Cả hai cứ giả vờ người kia sai, đủ lâu để học thêm được điều gì đó mới mẻ."


  # ============================================================
  # LAWRENCE HENSBANE

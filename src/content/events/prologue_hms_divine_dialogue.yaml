        next: mcbetha-worry
        display_order: 0

      - id: pastoral
        text: "Công việc mục vụ trên tàu trông như thế nào?"
        next: mcbetha-pastoral
        display_order: 1

      - id: book
        text: "${npc_2p} đang đọc gì vậy?"
        next: mcbetha-book
        display_order: 2

      - id: bilge-key

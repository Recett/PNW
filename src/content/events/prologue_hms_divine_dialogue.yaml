  - id: hensbane-first-meeting
    name: "Hensbane —Lần Đầu Gặp Mặt"
    event_type: dialogue
    next: hensbane-hub

    message:
      npc_speaker: lawrence-hensbane
      message_type: dialogue
      text: |
        Người đàn ông đứng gần mạn tàu, quan sát thủy thủ làm việc trên boong.

        "Người mới à? Trông ${2p} chưa quen đứng trên tàu, nhưng như thế cũng bình thường. Phần lớn người lần đầu ra biển đều cần vài ngày để quen với nhịp sóng và tiếng ồn liên tục."

        "${npc_1p} là Lawrence Hensbane, đội trưởng Claw Company. Đơn vị của ${npc_1p} được thuê đi theo chuyến này để đảm bảo an ninh và huấn luyện chiến đấu cho những người cần. Nếu ${2p} muốn học cách tự bảo vệ mình trước khi chúng ta cập bến, ${npc_1p} là người ${2p} nên tìm."

        "${npc_1p} không biến người ta thành lính chuyên nghiệp trong vài tuần, nhưng ${npc_1p} có thểgiúp họ đủ bình tĩnh để không hoảng loạn khi gặp rắc rối. Như vậy thường đã đủ rồi."

    actions:
      - type: flag
        flag_name: char.law-hensbane_known
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true


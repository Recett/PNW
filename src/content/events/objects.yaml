events:

  # ─────────────────────────────────────────────
  # BẾP (KITCHEN)
  # ─────────────────────────────────────────────

  - id: "kitchen-interact"
    name: "Bếp"
    event_type: "object"
    is_active: true

    message:
      title: "Bếp"
      text: "Một gian bếp nhỏ gọn với một cái bếp củi, một vài dụng cụ nấu ăn và một cái chậu rửa. Khá là hạn chế, nhưng trên tàu thì có vậy thôi. Cẩn thận củi lửa."
      message_type: "normal"

    option:
      - id: "kt-cook"
        text: "Nấu ăn [Tốn 5 stamina]"
        next: "kitchen-cook"
        display_order: 0
      - id: "kt-leave"
        text: "Bỏ đi"
        display_order: 1

  - id: "kitchen-cook"
    name: "Nấu Ăn"
    event_type: "object"
    is_active: true

    message:
      title: "Bếp"

    action:
      - type: cook

  # ─────────────────────────────────────────────
  # FISHING POLE
  # ─────────────────────────────────────────────

  - id: "fishing-pole-interact"
    name: "Cần Câu"
    event_type: "object"
    is_active: true

    message:
      title: "Cần Câu"
      text: "Một cây cần câu cũ kỹ tựa vào lan can thuyền, dây câu đã được móc mồi và buông thõng trên mặt nước."
      message_type: "normal"

    option:
      - id: "fp-cast"
        text: "Thả câu [Tốn 5 stamina]"
        next: "fishing-pole-cast"
        display_order: 0
      - id: "fp-leave"
        text: "Bỏ đi"
        display_order: 1

  - id: "fishing-pole-cast"
    name: "Thả Câu"
    event_type: "object"
    is_active: true

    message:
      title: "Cần Câu"

    action:
      - type: fish

  # ─────────────────────────────────────────────
  # OBJECT INTERACTIONS
  # ─────────────────────────────────────────────

  - id: "obj-small-cabinet-discovery"
    name: "Cái Tủ Nhỏ — Khám Phá"
    event_type: "object"
    is_active: true

    message:
      title: "Cái tủ nhỏ"
      text: |
        Trong góc tủ, đống vải cũ khẽ trũng xuống. Ánh sáng tràn qua khe cửa, chiếu rõ một cuộn lông mang ba mảng màu đen, trắng và cam.

        Cái đầu ngẩng lên.

        "Meo."

        Nó rướn cổ về phía mép sáng, đôi mắt vàng chớp nhẹ.
      message_type: "normal"

    action:
      - type: flag
        flag_name: "char.morale_cabinet_found"
        flag_value: 1
        flag_operation: set
        flag_type: character
        silent: true

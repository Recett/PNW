events:

  # -----------------------------------------------
  # BILGE ENCOUNTER — CORE LOOP
  # Each /explore bilge: pay 2 stamina → depth +1 →
  # determine rat tier → fight or flee.
  #
  # Flee: stamina paid upfront. Speed check (AGI).
  #   Pass: escape, depth reset, ejected.
  #   Fail: combat triggers anyway.
  # -----------------------------------------------

  - id: bilge-encounter-rat
    name: "Bilge Rat"
    event_type: encounter
    message:
      text: "Một con chuột cống lao ra từ giữa những thùng hàng. Móng vuốt của nó cào xước mặt gỗ ướt."

    option:
      - id: bilge-rat-fight
        text: "Chiến đấu"
        next: bilge-fight-rat
        display_order: 0
      - id: bilge-rat-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat
        display_order: 1

  - id: bilge-fight-rat
    name: "Fight rat"
    event_type: combat
    combat:
      enemy: rat
      on_victory: bilge-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat
    name: "Flee from rat"
    event_type: encounter

    check:
      - name: flee-speed-rat
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 7.5
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat

    action:
      - type: stat
        stat_name: stamina
        value: "-8"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat
    name: "Flee failed — rat"
    event_type: combat

    message:
      text: "Bạn trượt chân trên sàn ườt. Con chuột lập tức lao tới tấn công."

    combat:
      enemy: rat
      on_victory: bilge-victory
      on_defeat: bilge-defeat

  # ── RAT ADULT ENCOUNTER (depth 2+) ────────────

  - id: bilge-encounter-rat-adult
    name: "Adult Rat"
    event_type: encounter

    message:
      text: "Một con chuột khổng lồ gầm gừ trên xà ngang. Nó trừng mắt nhìn bạn, sẵn sàng chiến đấu."

    option:
      - id: bilge-rat-adult-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-adult
        display_order: 0
      - id: bilge-rat-adult-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-adult
        display_order: 1

  - id: bilge-fight-rat-adult
    name: "Fight adult rat"
    event_type: combat

    combat:
      enemy: rat_adult
      on_victory: bilge-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-adult
    name: "Flee from adult rat"
    event_type: encounter

    check:
      - name: flee-speed-rat-adult
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 8
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-adult

    action:
      - type: stat
        stat_name: stamina
        value: "-11"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-adult
    name: "Flee failed — adult rat"
    event_type: combat

    message:
      text: "Bạn chạy không kịp. Con chuột lớn hung hãn đuổi theo sát gót."

    combat:
      enemy: rat_adult
      on_victory: bilge-victory
      on_defeat: bilge-defeat

  # ── RAT KING ENCOUNTER (depth 4+, rare) ───────

  - id: bilge-encounter-rat-king
    name: "The Rat King"
    event_type: encounter

    message:
      text: |
        Bầy chuột đột ngột dạt ra hai bên. Một bóng đen khổng lồ lù lù xuất hiện trong bóng tối. Vua Chuột đang ở ngay trước mặt bạn.

    enemy:
      - enemy: rat_king
        display_order: 0

    option:
      - id: bilge-rat-king-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-king
        display_order: 0
      - id: bilge-rat-king-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-king
        display_order: 1

  - id: bilge-fight-rat-king
    name: "Fight the Rat King"
    event_type: combat

    combat:
      enemy: rat_king
      on_victory: bilge-rat-king-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-king
    name: "Flee from the Rat King"
    event_type: encounter

    check:
      - name: flee-speed-rat-king
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 8.5
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-king

    action:
      - type: stat
        stat_name: stamina
        value: "-15"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-king
    name: "Flee failed — Rat King"
    event_type: combat

    message:
      text: "Bạn vấp ngã. Vua Chuột chặn đứng lối thoát và chuẩn bị nghiền nát bạn."

    combat:
      enemy: rat_king

      on_victory: bilge-rat-king-victory
      on_defeat: bilge-defeat

  # ── RAT KING ENRAGED ENCOUNTER (no rats left) ──

  - id: bilge-encounter-rat-king-enraged
    name: "The Enraged Rat King"
    event_type: encounter

    message:
      text: |
        Hầm tàu im lặng đến rợn người. Không có gì di chuyển. Rồi bạn nghe thấy nó — một tiếng rít trầm, đều đặn, không ngừng. Vua Chuột xuất hiện từ bóng tối, đôi mắt đỏ rực. Không có bầy đàn nào ở đây nữa. Chỉ có nó.

    enemy:
      - enemy: rat_king_enraged
        display_order: 0

    option:
      - id: bilge-rat-king-enraged-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-king-enraged
        display_order: 0
      - id: bilge-rat-king-enraged-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-king-enraged
        display_order: 1

  - id: bilge-fight-rat-king-enraged
    name: "Fight the Enraged Rat King"
    event_type: combat

    combat:
      enemy: rat_king_enraged
      on_victory: bilge-rat-king-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-king-enraged
    name: "Flee from the Enraged Rat King"
    event_type: encounter

    check:
      - name: flee-speed-rat-king-enraged
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 6.5
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-king-enraged

    action:
      - type: stat
        stat_name: stamina
        value: "-15"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-king-enraged
    name: "Flee failed — Enraged Rat King"
    event_type: combat

    message:
      text: "Không kịp. Vua Chuột cắn phập vào chân bạn từ phía sau."

    combat:
      enemy: rat_king_enraged
      on_victory: bilge-rat-king-victory
      on_defeat: bilge-defeat

  # ── ADULT RAT UNDEAD ENCOUNTER ─────────────────

  - id: bilge-encounter-rat-adult-undead
    name: "Undead Adult Rat"
    event_type: encounter

    message:
      text: "Một con chuột to lớn với bộ lông rụng từng mảng lao ra. Nó không cần hơi thở để tấn công bạn."

    option:
      - id: bilge-rat-adult-undead-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-adult-undead
        display_order: 0
      - id: bilge-rat-adult-undead-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-adult-undead
        display_order: 1

  - id: bilge-fight-rat-adult-undead
    name: "Fight undead adult rat"
    event_type: combat

    combat:
      enemy: rat_adult_undead
      ambient_effect: bilge_gas
      on_victory: bilge-victory-rat
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-adult-undead
    name: "Flee from undead adult rat"
    event_type: encounter

    check:
      - name: flee-speed-rat-adult-undead
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 8
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-adult-undead

    action:
      - type: stat
        stat_name: stamina
        value: "-11"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-adult-undead
    name: "Flee failed — undead adult rat"
    event_type: combat

    message:
      text: "Bạn chạy không thoát. Con chuột to không biết mệt mỏi vẫn đuổi theo sát gót."

    combat:
      enemy: rat_adult_undead
      ambient_effect: bilge_gas
      on_victory: bilge-victory-rat
      on_defeat: bilge-defeat

  # ── RAT KING UNDEAD ENCOUNTER ──────────────────

  - id: bilge-encounter-rat-king-undead
    name: "The Undead Rat King"
    event_type: encounter

    message:
      text: |
        Bầy chuột thối rữa dạt ra hai bên. Một khối đen khổng lồ xuất hiện từ bóng tối. Vua Chuột không chết — nó đang đứng trước mặt bạn.

    enemy:
      - enemy: rat_king_undead
        display_order: 0

    option:
      - id: bilge-rat-king-undead-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-king-undead
        display_order: 0
      - id: bilge-rat-king-undead-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-king-undead
        display_order: 1

  - id: bilge-fight-rat-king-undead
    name: "Fight the Undead Rat King"
    event_type: combat

    combat:
      enemy: rat_king_undead
      ambient_effect: bilge_gas
      on_victory: bilge-rat-king-undead-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-king-undead
    name: "Flee from the Undead Rat King"
    event_type: encounter

    check:
      - name: flee-speed-rat-king-undead
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 8.5
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-king-undead

    action:
      - type: stat
        stat_name: stamina
        value: "-15"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-king-undead
    name: "Flee failed — Undead Rat King"
    event_type: combat

    message:
      text: "Bạn vấp ngã. Vua Chuột không chết chặn lối thoát, chuẩn bị nghiền nát bạn."

    combat:
      enemy: rat_king_undead
      ambient_effect: bilge_gas
      on_victory: bilge-rat-king-undead-victory
      on_defeat: bilge-defeat

  # ── RAT KING UNDEAD ENRAGED (all rats dead) ────

  - id: bilge-encounter-rat-king-undead-enraged
    name: "The Undead Rat King (Enraged)"
    event_type: encounter

    message:
      text: |
        Hầm tàu im lặng đến rợn người. Không có gì di chuyển. Rồi bạn nghe thấy nó — một tiếng rít trầm, đều đặn. Vua Chuột không chết xuất hiện từ bóng tối, đôi mắt đỏ rực như lửa. Tất cả lũ chuột đã bị tiêu diệt. Giờ chỉ còn nó.

    enemy:
      - enemy: rat_king_undead
        display_order: 0

    option:
      - id: bilge-rat-king-undead-enraged-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-king-undead-enraged
        display_order: 0
      - id: bilge-rat-king-undead-enraged-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-king-undead-enraged
        display_order: 1

  - id: bilge-fight-rat-king-undead-enraged
    name: "Fight the Enraged Undead Rat King"
    event_type: combat

    combat:
      enemy: rat_king_undead
      ambient_effect: bilge_gas
      on_victory: bilge-rat-king-undead-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-king-undead-enraged
    name: "Flee from the Enraged Undead Rat King"
    event_type: encounter

    check:
      - name: flee-speed-rat-king-undead-enraged
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 6.5
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-king-undead-enraged

    action:
      - type: stat
        stat_name: stamina
        value: "-15"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-king-undead-enraged
    name: "Flee failed — Enraged Undead Rat King"
    event_type: combat

    message:
      text: "Không kịp. Vua Chuột không chết cắn phập vào chân bạn từ phía sau."

    combat:
      enemy: rat_king_undead
      ambient_effect: bilge_gas
      on_victory: bilge-rat-king-undead-victory
      on_defeat: bilge-defeat

  # ── OUTCOMES ───────────────────────────────────

  - id: bilge-victory
    name: "Rat killed"
    event_type: encounter

    message:
      text: "Bạn đã hạ gục con chuột. Thu được một ít thịt chuột."

    action:
      - type: item
        item: rat_meat
        quantity: "1"
        operation: give
        silent: false
      - type: flag
        flag_name: global.rat_adults
        flag_value: "1"
        flag_operation: subtract
        flag_type: global
        silent: true

  - id: bilge-victory-rat
    name: "Undead rat killed"
    event_type: encounter

    message:
      text: "Bạn đã hạ gục con chuột. Thu được một ít thịt chuột."

    action:
      - type: item
        item: rat_meat
        quantity: "1"
        operation: give
        silent: false
      - type: flag
        flag_name: global.undead_rat_count
        flag_value: "1"
        flag_operation: subtract
        flag_type: global
        output_variable: remaining_rats
        silent: false
        custom_message: "Còn lại ${remaining_rats} con chuột dưới hầm tàu."

  # Fired by hunt.js when undead_rat_count=0 AND undead_rat_king_slain=1.
  # Sets the permanent bilge_cleared flag, awards XP to all, then posts to storyboard.
  - id: bilge-undead-cleared
    name: "Undead Bilge Cleared"
    event_type: encounter

    message:
      text: |
        Vua Chuột không-chết đã bị tiêu diệt. Hầm tàu im lặng hoàn toàn.

    action:
      - type: flag
        flag_name: global.undead_bilge_cleared
        flag_value: "1"
        flag_operation: set
        flag_type: global
        silent: true
      - type: narrate
        channel: storyboard
        title: "Hầm Tàu Im Lặng Lần Nữa"
        text: |
          Bầu không khí nặng nề trong hầm tàu cuối cùng cũng tan biến. Vua Chuột không-chết — thứ đã cai trị bóng tối phía dưới — đã bị tiêu diệt hoàn toàn.

          Những bộ xương chuột rải rác trên sàn gỗ ướt. Không còn tiếng sột soạt, không còn tiếng rít, không còn ánh đỏ rực từ đôi mắt trong bóng tối.

          Hầm tàu đã được thanh tẩy.

  - id: bilge-cleared
    name: "Bilge Cleared"
    event_type: encounter

    message:
      text: |
        Hầm tàu im lặng. Mọi con chuột đều đã bị tiêu diệt — kể cả Vua Chuột. Con tàu thở phào nhẹ nhõm.
        Tất cả thủy thủ được thưởng 1000 XP.

    action:
      - type: flag
        flag_name: global.bilge_cleared
        flag_value: "1"
        flag_operation: set
        flag_type: global
        silent: true
      - type: narrate
        channel: storyboard
        title: "Hầm Tàu Im Lặng"
        text: |
          Ánh sáng bình minh xám xịt lọt qua lưới chắn hầm tàu, và lần đầu tiên kể từ khi chuyến hành trình bắt đầu, âm thanh duy nhất còn lại chỉ là tiếng gỗ đưa võng và sóng biển vỗ mạn.

          Đàn chuột đã bị tiêu diệt. Từng con một — cả Vua Chuột cầm quyền vương quốc hôi thối của chúng trong bóng tối phía dưới.

          Những thủy thủ đã quen với tiếng cào cấu và rí rí trong đêm nay bỗng dưng cảm thấy bị giật mình bởi sự im lặng. Một vài người tụ tập bên miệng hầm, nhìn xuống bóng tối phía dưới, hầu như không dám tin vào mắt mình.

          Hầm tàu yên tĩnh.

          Tin tức lan ra nhanh chóng khắp các boong: nạn dịch đã chấm dứt. Thủy thủ bước nhẹ hơn, ngủ sâu hơn. Tàu HMS Divine thở phào.

          *Tất cả những ai đã chiến đấu trong bóng tối được thưởng 1000 XP.*

  - id: bilge-rat-king-victory
    name: "Rat King killed"
    event_type: encounter

    message:
      text: |
        Vua Chuột gục ngã, kéo theo sự hỗn loạn của cả bầy. Bạn nhổ được một chiếc răng nanh sắc nhọn từ xác nó, phần gốc còn dính cặn nhựa cây.

    action:
      - type: item
        item: ratsbane
        quantity: "1"
        operation: give
        silent: false
      - type: flag
        flag_name: char.rat_king_slain
        flag_value: "1"
        flag_operation: set
        flag_type: character
        silent: true
      - type: flag
        flag_name: global.rat_king_slain
        flag_value: "1"
        flag_operation: set
        flag_type: global
        silent: true

  - id: bilge-rat-king-undead-victory
    name: "Undead Rat King killed"
    event_type: encounter

    message:
      text: |
        Vua Chuột không-chết gục ngã. Xác nó tan rã thành bụi và xương mục. Hầm tàu bỗng tĩnh lặng hoàn toàn.

    action:
      - type: item
        item: ratsbane
        quantity: "1"
        operation: give
        silent: false
      - type: flag
        flag_name: char.undead_rat_king_slain
        flag_value: "1"
        flag_operation: set
        flag_type: character
        silent: true
      - type: flag
        flag_name: global.undead_rat_king_slain
        flag_value: "1"
        flag_operation: set
        flag_type: global
        silent: true
      - type: flag
        flag_name: global.undead_rat_count
        flag_value: "0"
        flag_operation: set
        flag_type: global
        silent: true
      - type: narrate
        channel: storyboard
        title: "Và rồi..."
        text: |
          Bầu không khí dưới hầm tàu nhẹ dần khi Vua Chuột không-chết gục ngã. Những con chuột còn lại từ từ trở lại thành những bộ xương vô hồn.

          *Chuyện gì đã xảy ra?*

    next: bilge-undead-cleared

  - id: bilge-defeat
    name: "Lost in bilge"
    event_type: encounter

    message:
      text: "Bạn đã bị trọng thương, lên boong dưỡng sức."

    action:
      - type: move
        location: adjacent_random
        movement_type: normal
        silent: true

  # ── MIASMA HAZARD ─────────────────────────────

  - id: bilge-encounter-miasma
    name: "Miasma"
    event_type: encounter

    message:
      text: |
        Một luồng khí độc từ xác chuột thối rữa bốc lên bao phủ lấy bạn. Phổi bạn bỏng rát — không có gì để chiến đấu, chỉ có thể cúi đầu chịu đựng và bước qua.

    action:
      - type: stat
        stat_name: currentHp
        value: "80"
        operation: percentage
        silent: false
        custom_message: "Khí độc hầm tàu gây thiệt hại 20% HP."

  # ── RAT GHOUL ENCOUNTER ────────────────────────

  - id: bilge-encounter-rat-ghoul
    name: "Rat Ghoul"
    event_type: encounter

    message:
      text: |
        Một bóng đen khổng lồ đứng giữa hầm tàu. Bộ xương chuột biến dạng, phủ đầy mô thịt thối và ánh mắt đỏ rực. Đây là một con Rat Ghoul — không phải loài thú bình thường bạn từng gặp.

    option:
      - id: bilge-ghoul-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-ghoul
        display_order: 0
      - id: bilge-ghoul-flee
        text: "Tránh Ghoul chẳng xấu mặt nào"
        next: bilge-flee-rat-ghoul
        display_order: 1

  - id: bilge-fight-rat-ghoul
    name: "Fight Rat Ghoul"
    event_type: combat

    combat:
      enemy: rat_ghoul

events:

  # -----------------------------------------------
  # BILGE ENCOUNTER — CORE LOOP
  # Each /explore bilge: pay 2 stamina → depth +1 →
  # determine rat tier → fight or flee.
  #
  # Flee: stamina paid upfront. Speed check (AGI).
  #   Pass: escape, depth reset, ejected.
  #   Fail: combat triggers anyway.
  # -----------------------------------------------

  - id: bilge-encounter-rat
    name: "Bilge Rat"
    event_type: encounter
    message:
      text: "Một con chuột cống lao ra từ giữa những thùng hàng. Móng vuốt của nó cào xước mặt gỗ ướt."

    option:
      - id: bilge-rat-fight
        text: "Chiến đấu"
        next: bilge-fight-rat
        display_order: 0
      - id: bilge-rat-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat
        display_order: 1

  - id: bilge-fight-rat
    name: "Fight rat"
    event_type: combat
    combat:
      enemy: rat
      on_victory: bilge-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat
    name: "Flee from rat"
    event_type: encounter
    silent: true

    check:
      - name: flee-speed-rat
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 7.5
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat

    action:
      - type: stat
        stat_name: stamina
        value: "-8"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat
    name: "Flee failed — rat"
    event_type: encounter

    message:
      text: "Bạn trượt chân trên sàn ườt. Con chuột lập tức lao tới tấn công."

    next: bilge-fight-rat

  # ── RAT ADULT ENCOUNTER (depth 2+) ────────────

  - id: bilge-encounter-rat-adult
    name: "Adult Rat"
    event_type: encounter

    message:
      text: "Một con chuột khổng lồ gầm gừ trên xà ngang. Nó trừng mắt nhìn bạn, sẵn sàng chiến đấu."

    option:
      - id: bilge-rat-adult-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-adult
        display_order: 0
      - id: bilge-rat-adult-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-adult
        display_order: 1

  - id: bilge-fight-rat-adult
    name: "Fight adult rat"
    event_type: combat

    combat:
      enemy: rat_adult
      on_victory: bilge-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-adult
    name: "Flee from adult rat"
    event_type: encounter
    silent: true

    check:
      - name: flee-speed-rat-adult
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 8
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-adult

    action:
      - type: stat
        stat_name: stamina
        value: "-11"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-adult
    name: "Flee failed — adult rat"
    event_type: encounter

    message:
      text: "Bạn chạy không kịp. Con chuột lớn hung hãn đuổi theo sát gót."

    next: bilge-fight-rat-adult

  # ── RAT KING ENCOUNTER (depth 4+, rare) ───────

  - id: bilge-encounter-rat-king
    name: "The Rat King"
    event_type: encounter

    message:
      text: |
        Bầy chuột đột ngột dạt ra hai bên. Một bóng đen khổng lồ lù lù xuất hiện trong bóng tối. Vua Chuột đang ở ngay trước mặt bạn.

    enemy:
      - enemy: rat_king
        display_order: 0

    option:
      - id: bilge-rat-king-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-king
        display_order: 0
      - id: bilge-rat-king-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-king
        display_order: 1

  - id: bilge-fight-rat-king
    name: "Fight the Rat King"
    event_type: combat

    combat:
      enemy: rat_king
      on_victory: bilge-rat-king-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-king
    name: "Flee from the Rat King"
    event_type: encounter
    silent: true

    check:
      - name: flee-speed-rat-king
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 8.5
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-king

    action:
      - type: stat
        stat_name: stamina
        value: "-15"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-king
    name: "Flee failed — Rat King"
    event_type: encounter

    message:
      text: "Bạn vấp ngã. Vua Chuột chặn đứng lối thoát và chuẩn bị nghiền nát bạn."

    next: bilge-fight-rat-king

  # ── RAT KING ENRAGED ENCOUNTER (no rats left) ──

  - id: bilge-encounter-rat-king-enraged
    name: "The Enraged Rat King"
    event_type: encounter

    message:
      text: |
        Hầm tàu im lặng đến rợn người. Không có gì di chuyển. Rồi bạn nghe thấy nó — một tiếng rít trầm, đều đặn, không ngừng. Vua Chuột xuất hiện từ bóng tối, đôi mắt đỏ rực. Không có bầy đàn nào ở đây nữa. Chỉ có nó.

    enemy:
      - enemy: rat_king_enraged
        display_order: 0

    option:
      - id: bilge-rat-king-enraged-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-king-enraged
        display_order: 0
      - id: bilge-rat-king-enraged-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-king-enraged
        display_order: 1

  - id: bilge-fight-rat-king-enraged
    name: "Fight the Enraged Rat King"
    event_type: combat

    combat:
      enemy: rat_king_enraged
      on_victory: bilge-rat-king-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-king-enraged
    name: "Flee from the Enraged Rat King"
    event_type: encounter
    silent: true

    check:
      - name: flee-speed-rat-king-enraged
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 6.5
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-king-enraged

    action:
      - type: stat
        stat_name: stamina
        value: "-15"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-king-enraged
    name: "Flee failed — Enraged Rat King"
    event_type: encounter

    message:
      text: "Không kịp. Vua Chuột cắn phập vào chân bạn từ phía sau."

    next: bilge-fight-rat-king-enraged

  # ── RAT UNDEAD ENCOUNTER ───────────────────────

  - id: bilge-encounter-rat-undead
    name: "Undead Rat"
    event_type: encounter

    message:
      text: "Con chuột nhỏ bước ra từ bóng tối. Lông rụng gần hết, mắt trống rỗng — nó đã chết từ lâu, nhưng vẫn đang di chuyển."

    option:
      - id: bilge-rat-undead-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-undead
        display_order: 0
      - id: bilge-rat-undead-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-undead
        display_order: 1

  - id: bilge-fight-rat-undead
    name: "Fight undead rat"
    event_type: combat

    combat:
      enemy: rat_undead
      ambient_effect: bilge_gas
      on_victory: bilge-victory-rat
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-undead
    name: "Flee from undead rat"
    event_type: encounter
    silent: true

    check:
      - name: flee-speed-rat-undead
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 6
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-undead

    action:
      - type: stat
        stat_name: stamina
        value: "-8"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-undead
    name: "Flee failed — undead rat"
    event_type: encounter

    message:
      text: "Con chuột chết không biết mệt. Nó bám theo bạn không buông."

    next: bilge-fight-rat-undead

  # ── ADULT RAT UNDEAD ENCOUNTER ─────────────────

  - id: bilge-encounter-rat-adult-undead
    name: "Undead Adult Rat"
    event_type: encounter

    message:
      text: "Một con chuột to lớn với bộ lông rụng từng mảng lao ra. Nó không cần hơi thở để tấn công bạn."

    option:
      - id: bilge-rat-adult-undead-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-adult-undead
        display_order: 0
      - id: bilge-rat-adult-undead-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-adult-undead
        display_order: 1

  - id: bilge-fight-rat-adult-undead
    name: "Fight undead adult rat"
    event_type: combat

    combat:
      enemy: rat_adult_undead
      ambient_effect: bilge_gas
      on_victory: bilge-victory-rat
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-adult-undead
    name: "Flee from undead adult rat"
    event_type: encounter
    silent: true

    check:
      - name: flee-speed-rat-adult-undead
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 8
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-adult-undead

    action:
      - type: stat
        stat_name: stamina
        value: "-11"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-adult-undead
    name: "Flee failed — undead adult rat"
    event_type: encounter

    message:
      text: "Bạn chạy không thoát. Con chuột to không biết mệt mỏi vẫn đuổi theo sát gót."

    next: bilge-fight-rat-adult-undead

  # ── RAT KING UNDEAD ENCOUNTER ──────────────────

  - id: bilge-encounter-rat-king-undead
    name: "The Undead Rat King"
    event_type: encounter

    message:
      text: |
        Rat King - hoặc ít nhất thứ đã từng là Rat King - xuất hiện trước mặt bạn. Nó đã chết, nhưng vẫn di chuyển. Xương của nó lộ ra ở một vài chỗ, và những mảng lông còn sót lại rụng xuống khi nó đi lại.

    enemy:
      - enemy: rat_king_undead
        display_order: 0

    option:
      - id: bilge-rat-king-undead-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-king-undead
        display_order: 0
      - id: bilge-rat-king-undead-flee
        text: "Bỏ chạy"
        next: bilge-flee-rat-king-undead
        display_order: 1

  - id: bilge-fight-rat-king-undead
    name: "Fight the Undead Rat King"
    event_type: combat

    combat:
      enemy: rat_king_undead
      ambient_effect: bilge_gas
      on_victory: bilge-rat-king-undead-victory
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-king-undead
    name: "Flee from the Undead Rat King"
    event_type: encounter
    silent: true

    check:
      - name: flee-speed-rat-king-undead
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 8.5
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-king-undead

    action:
      - type: stat
        stat_name: stamina
        value: "-15"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-king-undead
    name: "Flee failed — Undead Rat King"
    event_type: encounter

    message:
      text: "Bạn vấp ngã. Undead Rat King chặn lối thoát, chuẩn bị nghiền nát bạn."

    next: bilge-fight-rat-king-undead

  # ── OUTCOMES ───────────────────────────────────

  - id: bilge-victory
    name: "Rat killed"
    event_type: encounter

    message:
      text: "Bạn đã hạ gục con chuột. Thu được một ít thịt chuột."

    action:
      - type: item
        item: rat_meat
        quantity: "1"
        operation: give
        silent: false
      - type: flag
        flag_name: global.rat_adults
        flag_value: "1"
        flag_operation: subtract
        flag_type: global
        silent: true

  - id: bilge-victory-rat
    name: "Undead rat killed"
    event_type: encounter

    message:
      text: "Bạn đã hạ gục con chuột. Không chắc nó sẽ không dậy lại lần nữa, nhưng bạn tạm thời an toàn."

    action:
      - type: flag
        flag_name: global.undead_rat_count
        flag_value: "1"
        flag_operation: subtract
        flag_type: global
        output_variable: remaining_rats
        silent: false
        custom_message: "Còn lại ${remaining_rats} con chuột dưới hầm tàu."

  - id: bilge-victory-rat-ghoul
    name: "Rat Ghoul killed"
    event_type: encounter

    message:
      text: "Con Rat Ghoul gục xuống. Không thể tin nổi...cái quái gì đây? Và khó tin hơn là bạn đã đánh thắng nó"

    action:
      - type: flag
        flag_name: global.undead_rat_count
        flag_value: "1"
        flag_operation: subtract
        flag_type: global
        output_variable: remaining_rats
        silent: false
        custom_message: "Còn lại ${remaining_rats} con chuột dưới hầm tàu."

  - id: bilge-rat-king-victory
    name: "Rat King killed"
    event_type: encounter

    message:
      text: |
        Vua Chuột gục ngã, kéo theo sự hỗn loạn của cả bầy. Bạn nhổ được một chiếc răng nanh sắc nhọn từ xác nó, phần gốc còn dính cặn nhựa cây.

    action:
      - type: item
        item: ratsbane
        quantity: "1"
        operation: give
        silent: false
      - type: flag
        flag_name: char.rat_king_slain
        flag_value: "1"
        flag_operation: set
        flag_type: character
        silent: true
      - type: flag
        flag_name: global.rat_king_slain
        flag_value: "1"
        flag_operation: set
        flag_type: global
        silent: true

  - id: bilge-rat-king-undead-victory
    name: "Undead Rat King killed"
    event_type: encounter

    message:
      text: |
        Rat King gục ngã. Xác nó tan rã thành bụi và xương mục. Ở giữa đống xương là một vật kì lạ. Một viên đá màu xanh lá cây?

    action:
      - type: item
        item: ratsbane
        quantity: "1"
        operation: give
        silent: false
      - type: flag
        flag_name: char.undead_rat_king_slain
        flag_value: "1"
        flag_operation: set
        flag_type: character
        silent: true
      - type: flag
        flag_name: global.undead_rat_king_slain
        flag_value: "1"
        flag_operation: set
        flag_type: global
        silent: true
      - type: flag
        flag_name: global.undead_rat_count
        flag_value: "0"
        flag_operation: set
        flag_type: global
        silent: true
      - type: narrate
        channel: storyboard
        title: "Và rồi..."
        text: |
          Bầu không khí dưới hầm tàu nhẹ dần khi Rat King gục ngã. Những con chuột còn lại từ từ trở lại thành những bộ xương vô hồn.

          *Chuyện gì đã xảy ra?*

    next: bilge-undead-cleared

  - id: bilge-defeat
    name: "Lost in bilge"
    event_type: encounter

    message:
      text: "Bạn đã bị trọng thương, lên boong dưỡng sức."

    action:
      - type: move
        location: adjacent_random
        movement_type: normal
        silent: true

  # ── MIASMA HAZARD ─────────────────────────────
  # Two choices: sprint past (high stamina cost, escapes) or
  # hold breath/endure (CON check: pass = 5% HP, fail = 20% HP).

  - id: bilge-encounter-miasma
    name: "Miasma"
    event_type: encounter

    message:
      text: |
        Một mùi hôi thối nồng nặc bốc lên. Có lẽ không nên ở đây lâu.

    option:
      - id: bilge-miasma-run
        text: "Chạy!"
        next: bilge-miasma-run
        display_order: 0
      - id: bilge-miasma-endure
        text: "Bình tĩnh nín thở."
        next: bilge-miasma-endure
        display_order: 1

  - id: bilge-miasma-run
    name: "Miasma — Run past"
    event_type: encounter

    message:
      text: "Bạn lấy hết sức để chạy. Tiêu tốn 20 stamina."

    action:
      - type: stat
        stat_name: stamina
        value: "-20"
        operation: add
        silent: true

    next: bilge-flee-success

  - id: bilge-miasma-endure
    name: "Miasma — CON check"
    event_type: encounter

    check:
      - name: miasma-con-check
        type: stat
        stat_data:
          stat_name: con
          use_dice_roll: true
          difficulty_modifier: 5
        silent: true
        on_success: bilge-miasma-endure-success
        on_failure: bilge-miasma-endure-fail

  - id: bilge-miasma-endure-success
    name: "Miasma — Endured lightly"
    event_type: encounter

    message:
      text: "Bạn kiểm soát hơi thở, bước qua chậm rãi nhưng an toàn."

    action:
      - type: variable
        variable_name: hp_before
        source_type: stat
        source_name: currentHp
        silent: true
      - type: stat
        stat_name: currentHp
        value: "95"
        operation: percentage
        output_variable: hp_after
        silent: false
        custom_message: "Lost ${hp_before - hp_after} HP."

  - id: bilge-miasma-endure-fail
    name: "Miasma — Endured badly"
    event_type: encounter

    message:
      text: "Bạn cố nín thở nhưng cuối cùng không thể chịu nổi."

    action:
      - type: variable
        variable_name: hp_before
        source_type: stat
        source_name: currentHp
        silent: true
      - type: stat
        stat_name: currentHp
        value: "80"
        operation: percentage
        output_variable: hp_after
        silent: false
        custom_message: "Lost ${hp_before - hp_after} HP."

  # ── RAT GHOUL ENCOUNTER ────────────────────────

  - id: bilge-encounter-rat-ghoul
    name: "Rat Ghoul"
    event_type: encounter

    message:
      text: |
        Một bóng đen khổng lồ đứng giữa hầm tàu. Bộ xương chuột biến dạng, phủ đầy mô thịt thối và ánh mắt đỏ rực. Đây là một con Rat Ghoul — không phải loài thú bình thường bạn từng gặp.

    option:
      - id: bilge-ghoul-fight
        text: "Chiến đấu"
        next: bilge-fight-rat-ghoul
        display_order: 0
      - id: bilge-ghoul-flee
        text: "Tránh Ghoul chẳng xấu mặt nào"
        next: bilge-flee-rat-ghoul
        display_order: 1

  - id: bilge-fight-rat-ghoul
    name: "Fight Rat Ghoul"
    event_type: combat

    combat:
      enemy: rat_ghoul
      ambient_effect: bilge_gas
      on_victory: bilge-victory-rat-ghoul
      on_defeat: bilge-defeat

  - id: bilge-flee-rat-ghoul
    name: "Flee from Rat Ghoul"
    event_type: encounter
    silent: true

    check:
      - name: flee-speed-rat-ghoul
        type: stat
        stat_data:
          stat_name: agi
          use_dice_roll: true
          difficulty_modifier: 9
        silent: true
        on_success: bilge-flee-success
        on_failure: bilge-flee-fail-rat-ghoul

    action:
      - type: stat
        stat_name: stamina
        value: "-10"
        operation: add
        silent: true

  - id: bilge-flee-fail-rat-ghoul
    name: "Flee failed — Rat Ghoul"
    event_type: encounter

    message:
      text: "Con Rat Ghoul chặn lối thoát. Bạn không còn lựa chọn nào khác."

    next: bilge-fight-rat-ghoul

  - id: bilge-flee-success
    name: "Escaped bilge"
    event_type: encounter

    message:
      text: "Bạn nhanh chân tẩu thoát an toàn."

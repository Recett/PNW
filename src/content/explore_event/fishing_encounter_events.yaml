events:

  # -----------------------------------------------
  # SỰ CỐ CÂU CÁ — HMS DIVINE (PROLOGUE)
  # Kích hoạt khi thả câu và kết quả là cua hoặc cá mập.
  #
  # Luồng:
  #   fish-encounter-crab  →  chiến đấu → fish-fight-crab
  #                        →  thả ra    → fish-release-crab
  #   fish-encounter-shark →  chiến đấu → fish-fight-shark
  #                        →  cắt dây   → fish-cut-shark
  #   on_victory: fish-crab-victory / fish-shark-victory
  #   on_defeat:  fish-defeat (dùng chung)
  # -----------------------------------------------

  # ── CUA BIỂN KHỔNG LỒ ──────────────────────────

  - id: fish-encounter-crab
    name: "Cua Biển Khổng Lồ Cắn Câu"
    event_type: encounter

    message:
      text: |
        Có gì đó giật dây mạnh đến nỗi cần câu gần gãy. Bạn kéo lên — một con cua biển khổng lồ, càng kẹp loạn xạ.
        Và giờ nó đang ở trên boong tàu cùng với bạn.

    option:
      - id: fish-crab-fight
        text: "Chiến đấu"
        next: fish-fight-crab
        display_order: 0
      - id: fish-crab-release
        text: "Thả nó xuống biển"
        next: fish-release-crab
        display_order: 1

  - id: fish-fight-crab
    name: "Chiến đấu với cua biển"
    event_type: combat

    combat:
      enemy: giant_crab
      on_victory: fish-crab-victory
      on_defeat: fish-defeat

  - id: fish-release-crab
    name: "Thả cua xuống biển"
    event_type: encounter

    message:
      text: "Bạn đẩy con cua qua lan can. Nó biến mất vào sóng biển, vẫn hung hăng — và mang theo lưỡi câu của bạn."

  - id: fish-crab-victory
    name: "Cua bị đánh bại"
    event_type: encounter

    message:
      text: "Bạn ghim con cua xuống và gỡ nó ra. Thịt ngon đấy. Bếp trưởng sẽ hài lòng."

    action:
      - type: item
        item: crab_meat
        quantity: "1"
        operation: give
        silent: false

  # ── CÁ MẬP ─────────────────────────────────────

  - id: fish-encounter-shark
    name: "Cá Mập Cắn Câu"
    event_type: encounter

    message:
      text: |
        Dây câu căng đến mức gần đứt — cần câu suýt bứt khỏi tay bạn. Thứ ở đầu kia dây thật khổng lồ.
        Rồi con cá mập trồi lên mặt nước.

    option:
      - id: fish-shark-fight
        text: "Giữ dây và chiến đấu"
        next: fish-fight-shark
        display_order: 0
      - id: fish-shark-cut
        text: "Cắt dây câu"
        next: fish-cut-shark
        display_order: 1

  - id: fish-fight-shark
    name: "Chiến đấu với cá mập"
    event_type: combat

    combat:
      enemy: shark
      on_victory: fish-shark-victory
      on_defeat: fish-defeat

  - id: fish-cut-shark
    name: "Cắt dây câu"
    event_type: encounter

    message:
      text: "Bạn rút dao và cắt đứt dây. Con cá mập kéo theo lưỡi câu và hai chục mét thừng. Có lẽ là quyết định đúng."

  - id: fish-shark-victory
    name: "Cá mập bị đánh bại"
    event_type: encounter

    message:
      text: "Bạn dồn toàn lực. Con cá mập nằm im trên boong, nặng nề. Cả thủy thủ đoàn sẽ kể mãi chuyện này."

    action:
      - type: item
        item: shark_meat
        quantity: "1"
        operation: give
        silent: false

  # ── THẤT BẠI CHUNG ─────────────────────────────

  - id: fish-defeat
    name: "Thua khi câu cá"
    event_type: encounter

    message:
      text: "Quá sức chịu đựng. Bạn buông tay và sinh vật trốn xuống biển. Bạn gượng đứng dậy, người đầy vết bầm."
